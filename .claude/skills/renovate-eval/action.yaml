---
name: Renovate PR Evaluation
description: Evaluate Renovate PRs with AI-powered analysis and audit loop

inputs:
  pr_number:
    description: PR number to evaluate
    required: true
  mode:
    description: "'dry-run' or 'post'"
    required: false
    default: dry-run
  context:
    description: "'local' or 'ci'"
    required: false
    default: ci
  provider:
    description: "'claude' or 'codex'"
    required: false
    default: ''
  evaluator_model:
    description: Model for evaluator
    required: false
    default: opus
  auditor_model:
    description: Model for auditor
    required: false
    default: sonnet
  codex_evaluator_model:
    description: Codex model for evaluator; empty uses Codex default
    required: false
    default: ''
  codex_auditor_model:
    description: Codex model for auditor; empty uses Codex default
    required: false
    default: ''
  codex_reasoning_effort:
    description: Codex reasoning effort; empty uses Codex default
    required: false
    default: ''
  codex_version:
    description: Codex CLI npm package version
    required: false
    default: latest
  yolo:
    description: Run the selected agent provider in yolo mode
    required: false
    default: 'true'
  install_superpowers:
    description: Install Superpowers for the selected agent provider
    required: false
    default: 'true'
  superpowers_version:
    description: >-
      Superpowers release tag or git ref to install; latest resolves the latest
      GitHub release
    required: false
    default: latest
  agent_timeout:
    description: Agent subprocess timeout in seconds; 0 disables the timeout
    required: false
    default: '600'
  ci_timeout:
    description: CI wait timeout in seconds
    required: false
    default: '300'
  instructions:
    description: Additional instructions for the evaluator
    required: false
    default: ''
  anthropic_api_key:
    description: Anthropic API key (use this OR claude_code_oauth_token)
    required: false
    default: ''
  claude_code_oauth_token:
    description: Claude Code OAuth token (use this OR anthropic_api_key)
    required: false
    default: ''
  github_token:
    description: GitHub token for gh CLI
    required: true

runs:
  using: composite
  steps:
  - name: Setup Node
    uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
    with:
      node-version: '24'

  - name: Resolve provider
    id: provider
    shell: bash
    env:
      INPUT_PROVIDER: ${{ inputs.provider }}
    run: |
      provider="$INPUT_PROVIDER"
      if [[ -z "$provider" ]]; then
        provider="${RENOVATE_EVAL_PROVIDER:-claude}"
      fi
      case "$provider" in
        claude|codex) ;;
        *)
          echo "Unsupported provider: $provider" >&2
          exit 1
          ;;
      esac
      echo "provider=$provider" >> "$GITHUB_OUTPUT"

  - name: Install Claude CLI
    if: steps.provider.outputs.provider == 'claude'
    shell: bash
    run: npm install -g @anthropic-ai/claude-code

  - name: Install Codex CLI
    if: steps.provider.outputs.provider == 'codex'
    shell: bash
    env:
      CODEX_VERSION: ${{ inputs.codex_version }}
    run: npm install -g "@openai/codex@$CODEX_VERSION"

  - name: Install Superpowers
    id: superpowers
    shell: bash
    env:
      INPUT_INSTALL_SUPERPOWERS: ${{ inputs.install_superpowers }}
      INPUT_SUPERPOWERS_VERSION: ${{ inputs.superpowers_version }}
      INPUT_PROVIDER: ${{ steps.provider.outputs.provider }}
    run: |
      set -euo pipefail

      case "$INPUT_INSTALL_SUPERPOWERS" in
        true)
          ;;
        false|'')
          echo "Superpowers install disabled"
          exit 0
          ;;
        *)
          echo "Unsupported install_superpowers value: $INPUT_INSTALL_SUPERPOWERS" >&2
          exit 1
          ;;
      esac

      superpowers_ref="$INPUT_SUPERPOWERS_VERSION"
      if [[ -z "$superpowers_ref" || "$superpowers_ref" == "latest" ]]; then
        latest_url=$(curl -fsSLI \
          --retry 5 \
          --retry-all-errors \
          --retry-connrefused \
          --retry-delay 2 \
          --retry-max-time 60 \
          --connect-timeout 10 \
          --max-time 60 \
          -o /dev/null \
          -w '%{url_effective}' \
          https://github.com/obra/superpowers/releases/latest)
        superpowers_ref="${latest_url##*/}"
      elif [[ "$superpowers_ref" =~ ^[0-9]+([.][0-9]+)+$ ]]; then
        superpowers_ref="v$superpowers_ref"
      fi

      install_root=$(mktemp -d "${RUNNER_TEMP:-/tmp}/superpowers.XXXXXX")
      checkout="$install_root/superpowers"
      git -c advice.detachedHead=false clone \
        --quiet \
        --depth=1 \
        --branch "$superpowers_ref" \
        https://github.com/obra/superpowers \
        "$checkout"

      echo "Installed Superpowers from ref $superpowers_ref"

      case "$INPUT_PROVIDER" in
        claude)
          if [[ ! -f "$checkout/.claude-plugin/plugin.json" ]]; then
            echo "Superpowers checkout does not contain .claude-plugin/plugin.json" >&2
            exit 1
          fi
          echo "claude_plugin_dir=$checkout" >> "$GITHUB_OUTPUT"
          ;;
        codex)
          if [[ ! -f "$checkout/.codex-plugin/plugin.json" ]]; then
            echo "Superpowers checkout does not contain .codex-plugin/plugin.json" >&2
            exit 1
          fi

          marketplace="$install_root/codex-marketplace"
          mkdir -p "$marketplace/.agents/plugins" "$marketplace/plugins"
          ln -s "$checkout" "$marketplace/plugins/superpowers"
          cat > "$marketplace/.agents/plugins/marketplace.json" <<'JSON'
      {
        "name": "renovate-eval-superpowers",
        "interface": {
          "displayName": "Renovate Eval Superpowers"
        },
        "plugins": [
          {
            "name": "superpowers",
            "source": {
              "source": "local",
              "path": "./plugins/superpowers"
            },
            "policy": {
              "installation": "AVAILABLE",
              "authentication": "ON_INSTALL",
              "products": [
                "CODEX"
              ]
            },
            "category": "Developer Tools"
          }
        ]
      }
      JSON
          codex plugin remove superpowers@renovate-eval-superpowers --json >/dev/null 2>&1 || true
          codex plugin marketplace remove renovate-eval-superpowers >/dev/null 2>&1 || true
          codex plugin marketplace add "$marketplace" --json
          codex plugin add superpowers --marketplace renovate-eval-superpowers --json
          ;;
        *)
          echo "Unsupported provider for Superpowers install: $INPUT_PROVIDER" >&2
          exit 1
          ;;
      esac

  - name: Install GitHub CLI
    shell: bash
    run: |
      set -euo pipefail

      latest_url=$(curl -fsSLI \
        --retry 5 \
        --retry-all-errors \
        --retry-connrefused \
        --retry-delay 2 \
        --retry-max-time 60 \
        --connect-timeout 10 \
        --max-time 60 \
        -o /dev/null \
        -w '%{url_effective}' \
        https://github.com/cli/cli/releases/latest)
      version="${latest_url##*/v}"
      if [[ ! "$version" =~ ^[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
        echo "Unable to determine latest GitHub CLI version from: $latest_url" >&2
        exit 1
      fi

      case "$(uname -m)" in
        x86_64|amd64)
          arch=amd64
          ;;
        aarch64|arm64)
          arch=arm64
          ;;
        *)
          echo "Unsupported architecture for GitHub CLI: $(uname -m)" >&2
          exit 1
          ;;
      esac

      install_root=$(mktemp -d "${RUNNER_TEMP:-/tmp}/gh-cli.XXXXXX")
      archive="$install_root/gh.tar.gz"
      download_url="https://github.com/cli/cli/releases/download/v${version}/gh_${version}_linux_${arch}.tar.gz"

      echo "Installing GitHub CLI v${version} from upstream release"
      curl -fsSL \
        --retry 5 \
        --retry-all-errors \
        --retry-connrefused \
        --retry-delay 2 \
        --retry-max-time 120 \
        --connect-timeout 10 \
        -o "$archive" \
        "$download_url"
      tar -xzf "$archive" -C "$install_root"

      gh_bin_dir=$(find "$install_root" -maxdepth 2 -type d -name bin | head -1)
      if [[ -z "$gh_bin_dir" || ! -x "$gh_bin_dir/gh" ]]; then
        echo "Downloaded GitHub CLI archive did not contain an executable gh" >&2
        exit 1
      fi

      sudo cp "$gh_bin_dir/gh" /usr/local/bin/gh
      sudo chmod 0755 /usr/local/bin/gh
      command -v gh
      gh --version

  - name: Run evaluation
    id: evaluate
    shell: bash
    env:
      GH_TOKEN: ${{ inputs.github_token }}
      ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude_code_oauth_token }}
      EVAL_INSTRUCTIONS: ${{ inputs.instructions }}
      INPUT_PR_NUMBER: ${{ inputs.pr_number }}
      INPUT_MODE: ${{ inputs.mode }}
      INPUT_CONTEXT: ${{ inputs.context }}
      INPUT_PROVIDER: ${{ steps.provider.outputs.provider }}
      INPUT_EVALUATOR_MODEL: ${{ inputs.evaluator_model }}
      INPUT_AUDITOR_MODEL: ${{ inputs.auditor_model }}
      INPUT_CODEX_EVALUATOR_MODEL: ${{ inputs.codex_evaluator_model }}
      INPUT_CODEX_AUDITOR_MODEL: ${{ inputs.codex_auditor_model }}
      INPUT_CODEX_REASONING_EFFORT: ${{ inputs.codex_reasoning_effort }}
      INPUT_YOLO: ${{ inputs.yolo }}
      INPUT_AGENT_TIMEOUT: ${{ inputs.agent_timeout }}
      INPUT_CI_TIMEOUT: ${{ inputs.ci_timeout }}
      RENOVATE_EVAL_CLAUDE_PLUGIN_DIR: ${{ steps.superpowers.outputs.claude_plugin_dir }}
      ACTION_PATH: ${{ github.action_path }}
    run: |
      set -euo pipefail

      ARGS=(
        evaluate
        --pr "$INPUT_PR_NUMBER"
        --"$INPUT_MODE"
        --context "$INPUT_CONTEXT"
        --provider "$INPUT_PROVIDER"
        --evaluator-model "$INPUT_EVALUATOR_MODEL"
        --auditor-model "$INPUT_AUDITOR_MODEL"
        --ci-timeout "$INPUT_CI_TIMEOUT"
        --keep-artifacts
      )
      if [[ -n "$INPUT_CODEX_EVALUATOR_MODEL" ]]; then
        ARGS+=(--codex-evaluator-model "$INPUT_CODEX_EVALUATOR_MODEL")
      fi
      if [[ -n "$INPUT_CODEX_AUDITOR_MODEL" ]]; then
        ARGS+=(--codex-auditor-model "$INPUT_CODEX_AUDITOR_MODEL")
      fi
      if [[ -n "$INPUT_CODEX_REASONING_EFFORT" ]]; then
        ARGS+=(--codex-reasoning-effort "$INPUT_CODEX_REASONING_EFFORT")
      fi
      case "$INPUT_YOLO" in
        true)
          ARGS+=(--yolo)
          ;;
        false|'')
          ;;
        *)
          echo "Unsupported yolo value: $INPUT_YOLO" >&2
          exit 1
          ;;
      esac
      if [[ -n "$INPUT_AGENT_TIMEOUT" ]]; then
        ARGS+=(--agent-timeout "$INPUT_AGENT_TIMEOUT")
      fi
      if [[ -n "$EVAL_INSTRUCTIONS" ]]; then
        ARGS+=(--instructions "$EVAL_INSTRUCTIONS")
      fi
      OUTPUT=$(python3 "$ACTION_PATH/renovate_eval.py" "${ARGS[@]}" 2>&1 | tee /dev/stderr)
      ARTIFACT_PATH=$(echo "$OUTPUT" | grep "^Artifacts:" | tail -1 | sed 's/Artifacts: //')
      echo "artifact_path=$ARTIFACT_PATH" >> "$GITHUB_OUTPUT"
      if [[ -n "$ARTIFACT_PATH" && -f "$ARTIFACT_PATH/result.json" ]]; then
        echo "result_json=$ARTIFACT_PATH/result.json" >> "$GITHUB_OUTPUT"
      fi

  - name: Upload artifacts
    uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
    if: always()
    with:
      name: renovate-eval-${{ inputs.pr_number }}
      path: ${{ steps.evaluate.outputs.artifact_path || '/tmp/renovate-eval-*' }}
      if-no-files-found: warn
