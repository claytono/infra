---
name: Detect ArgoCD apps from changes
description: Outputs app names that changed between two refs

inputs:
  base_ref:
    required: false
    description: Git ref or SHA to diff from (if empty, finds all apps)
  head_ref:
    required: false
    description: Git ref or SHA to diff to (if empty, finds all apps)
  pr_number:
    required: false
    description: PR number for commenting (if empty, uses echo instead of gh pr comment)
  action_type:
    required: false
    default: deploy
    description: Action type for no-apps message (deploy, diff, reset)
  event_name:
    required: false
    default: issue_comment
    description: GitHub event name (pull_request or issue_comment)

outputs:
  apps:
    description: Space-separated list of app names
    value: ${{ steps.collect.outputs.apps }}

runs:
  using: composite
  steps:
  - name: Fetch refs (if provided)
    shell: bash
    env:
      BASE_REF: ${{ inputs.base_ref }}
      HEAD_REF: ${{ inputs.head_ref }}
    run: |
      set -euo pipefail
      if [[ -n "$BASE_REF" ]]; then
        git fetch --no-tags --prune origin "+${BASE_REF}" || true
      fi
      if [[ -n "$HEAD_REF" ]]; then
        git fetch --no-tags --prune origin "+${HEAD_REF}" || true
      fi

  - name: Collect apps
    id: collect
    shell: bash
    env:
      BASE_REF: ${{ inputs.base_ref }}
      HEAD_REF: ${{ inputs.head_ref }}
    run: |
      set -euo pipefail
      base="$BASE_REF"
      head="$HEAD_REF"
      if [[ -z "$base" || -z "$head" ]]; then
        # No refs provided - find all apps (for workflow_dispatch or similar)
        echo "No refs provided - finding all ArgoCD applications"
        apps=$(argocd app list -o name | sed 's|argocd/||g' | tr '\n' ' ' | sed 's/ $//')
        echo "Found applications: $apps"
        echo "apps=$apps" >> "$GITHUB_OUTPUT"
      else
        # Use the argocd-detect-apps script for change detection
        "${GITHUB_WORKSPACE}/trusted-main/scripts/argocd-detect-apps" --base-ref "$base" --head-ref "$head" --scan-root "${GITHUB_WORKSPACE}"
      fi

  - name: Comment if no apps found
    if: steps.collect.outputs.apps == ''
    shell: bash
    env:
      GH_TOKEN: ${{ github.token }}
      ACTION_TYPE: ${{ inputs.action_type }}
      PR_NUMBER: ${{ inputs.pr_number }}
      INPUT_EVENT_NAME: ${{ inputs.event_name }}
    run: |-
      action_type="$ACTION_TYPE"
      pr_number="$PR_NUMBER"
      event_name="$INPUT_EVENT_NAME"

      message="📋 No ArgoCD applications detected in changed files - nothing to ${action_type}."

      if [[ -n "$pr_number" ]]; then
        if [[ "$event_name" == "issue_comment" ]]; then
          # Comment for slash commands
          gh pr comment "$pr_number" --body "$message"
        else
          # Don't comment for automatic PR runs when no apps detected
          echo "$message (not commenting since this is an automatic run)"
        fi
      else
        echo "$message"
      fi
