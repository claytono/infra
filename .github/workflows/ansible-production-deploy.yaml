---
name: Ansible Production Deployment

on:
  push:
    branches: [main]
    paths: [ansible/**]
  workflow_dispatch:
    inputs:
      hosts:
        description: Hosts to deploy (space-separated, or "all")
        required: false
        default: all
      tags:
        description: Ansible tags to run (comma-separated, e.g., "common,users")
        required: false
        default: ''

jobs:
  ansible-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Wait for previous deployments
      uses: softprops/turnstyle@0a4c08efacb8bba0f9dae0b2a30770f4aa114b5c

    - name: Checkout code
      uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      with:
        persist-credentials: false
        fetch-depth: 0

    - name: Checkout trusted scripts
      uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      with:
        persist-credentials: false
        ref: main
        path: trusted-main

    - name: Detect Changed Hosts
      id: detect
      uses: ./trusted-main/.github/actions/detect-hosts
      with:
        base_ref: ${{ github.event_name == 'workflow_dispatch' && '' || github.event.before }}
        head_ref: ${{ github.event_name == 'workflow_dispatch' && '' || github.sha }}

    - name: Override hosts for workflow_dispatch
      id: hosts
      env:
        INPUT_HOSTS: ${{ github.event.inputs.hosts }}
        DETECTED_HOSTS: ${{ steps.detect.outputs.hosts }}
        DETECTED_HAS_CHANGES: ${{ steps.detect.outputs.has_changes }}
      run: |
        if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && -n "$INPUT_HOSTS" ]]; then
          echo "hosts=$INPUT_HOSTS" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
        else
          echo "hosts=$DETECTED_HOSTS" >> "$GITHUB_OUTPUT"
          echo "has_changes=$DETECTED_HAS_CHANGES" >> "$GITHUB_OUTPUT"
        fi

    - name: Setup Nix
      if: steps.hosts.outputs.has_changes == 'true' && steps.hosts.outputs.hosts !=
        ''
      uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b  # v31
      with:
        github_access_token: ${{ github.token }}

    - name: Setup Cachix
      if: steps.hosts.outputs.has_changes == 'true' && steps.hosts.outputs.hosts !=
        ''
      uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c  # v17
      with:
        name: claytono
        authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

    - name: Setup Semaphore
      if: steps.hosts.outputs.has_changes == 'true' && steps.hosts.outputs.hosts !=
        ''
      uses: ./trusted-main/.github/actions/setup-semaphore
      with:
        tailscale_oauth_client_id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
        tailscale_oauth_secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}

    - name: Deploy via Semaphore
      if: steps.hosts.outputs.has_changes == 'true' && steps.hosts.outputs.hosts !=
        ''
      env:
        SEMAPHORE_API_TOKEN: ${{ secrets.SEMAPHORE_API_TOKEN }}
        SEMAPHORE_URL: https://semaphore.cow-banjo.ts.net
        SEMAPHORE_DISPLAY_URL: https://semaphore.k.oneill.net
        INPUT_TAGS: ${{ github.event.inputs.tags }}
        DEPLOY_HOSTS: ${{ steps.hosts.outputs.hosts }}
        SEMAPHORE_PROJECT: ${{ vars.SEMAPHORE_PROJECT }}
        SEMAPHORE_TEMPLATE: ${{ vars.SEMAPHORE_TEMPLATE }}
      run: |-
        DEPLOY_ARGS=(
          --hosts "$DEPLOY_HOSTS"
          --project "$SEMAPHORE_PROJECT"
          --template "$SEMAPHORE_TEMPLATE"
        )
        if [[ -n "$INPUT_TAGS" ]]; then
          DEPLOY_ARGS+=(--tags "$INPUT_TAGS")
        fi
        nix develop --command python3 \
          "${GITHUB_WORKSPACE}/trusted-main/scripts/semaphore-deploy" \
          "${DEPLOY_ARGS[@]}"
