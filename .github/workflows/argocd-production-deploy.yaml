---
name: ArgoCD Production Deployment

on:
  push:
    branches: [main]
    paths: [kubernetes/**]
  workflow_dispatch:

jobs:
  argocd-deploy:
    runs-on: ubuntu-latest
    env:
      ARGOCD_SERVER: argocd.cow-banjo.ts.net
      ARGOCD_OPTS: --grpc-web

    steps:
    - name: Wait for previous deployments
      uses: softprops/turnstyle@fa86562458e34a9067f0dc1316a76b3975b1c413  # v3.3.1

    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      with:
        persist-credentials: false
        fetch-depth: 0

    - name: Checkout trusted scripts
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      with:
        persist-credentials: false
        fetch-depth: 0
        ref: main
        path: trusted-main

    - name: Detect Changed Apps
      id: detect
      uses: ./trusted-main/.github/actions/detect-apps
      with:
        base_ref: ${{ github.event_name == 'workflow_dispatch' && '' || github.event.before }}
        head_ref: ${{ github.event_name == 'workflow_dispatch' && '' || github.sha }}
        action_type: deploy

    - name: Setup ArgoCD environment
      if: steps.detect.outputs.apps != ''
      id: setup-argocd
      uses: ./trusted-main/.github/actions/setup-argocd
      with:
        tailscale_oauth_client_id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
        tailscale_oauth_secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}

    - name: Deploy Applications to Main
      if: steps.detect.outputs.apps != ''
      env:
        ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        DETECTED_APPS: ${{ steps.detect.outputs.apps }}
        SERVER_URL: ${{ github.server_url }}
        RUN_ID: ${{ github.run_id }}
      run: |-
        "${GITHUB_WORKSPACE}/trusted-main/scripts/argocd-deploy" \
          --apps "$DETECTED_APPS" \
          --target-revision "main" \
          --action-run-url "$SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$RUN_ID"
