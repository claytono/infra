---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
      with:
        persist-credentials: false

    - name: Install Nix
      uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342  # v31
      with:
        github_access_token: ${{ github.token }}

    - name: Setup Cachix
      uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71  # v17
      with:
        name: claytono
        authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

    - name: Cache pre-commit
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6
      with:
        path: ~/.cache/pre-commit
        key: precommit-${{ hashFiles('.pre-commit-config.yaml') }}
        restore-keys: |
          precommit-

    - name: Write vault password file
      run: echo "$ANSIBLE_VAULT_PASSWORD" > ansible/ansible-vault-password
      env:
        ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}

    - name: Run lint
      run: nix develop --command ./scripts/lint
      env:
        SKIP: terraform_validate,terraform_providers_lock
        GH_TOKEN: ${{ github.token }}
