---
name: Weekly Issue Triage

on:
  schedule:
  - cron: 0 1 * * 2  # Tuesday 1am UTC
  workflow_dispatch:
    inputs:
      issue_number:
        description: Specific issue number (blank = all)
        required: false
        type: string
      dry_run:
        description: Dry run (no comments/labels)
        required: false
        type: boolean
        default: false
      provider:
        description: AI provider for triage
        required: false
        type: choice
        options:
        - claude
        - codex
        default: codex
      codex_runner_label:
        description: Runner label for provider=codex
        required: false
        type: string
        default: codex
      codex_reasoning_effort:
        description: Codex reasoning effort for provider=codex
        required: false
        type: string
        default: xhigh
      codex_agent_timeout:
        description: Codex agent subprocess timeout in seconds; 0 disables the timeout
        required: false
        type: string
        default: '1800'
      codex_version:
        description: Codex CLI npm package version
        required: false
        type: string
        default: latest

jobs:
  resolve-provider:
    runs-on: ubuntu-latest
    outputs:
      provider: ${{ steps.resolve.outputs.provider }}
      runner_label: ${{ steps.resolve.outputs.runner_label }}
      codex_reasoning_effort: ${{ steps.resolve.outputs.codex_reasoning_effort }}
      codex_agent_timeout: ${{ steps.resolve.outputs.codex_agent_timeout }}
      codex_version: ${{ steps.resolve.outputs.codex_version }}
    steps:
    - name: Resolve provider
      id: resolve
      env:
        INPUT_PROVIDER: ${{ inputs.provider }}
        INPUT_CODEX_RUNNER_LABEL: ${{ inputs.codex_runner_label }}
        INPUT_CODEX_REASONING_EFFORT: ${{ inputs.codex_reasoning_effort }}
        INPUT_CODEX_AGENT_TIMEOUT: ${{ inputs.codex_agent_timeout }}
        INPUT_CODEX_VERSION: ${{ inputs.codex_version }}
      run: |
        PROVIDER="${INPUT_PROVIDER:-codex}"
        CODEX_REASONING_EFFORT=""
        CODEX_AGENT_TIMEOUT=""
        CODEX_VERSION=""

        case "$PROVIDER" in
          claude)
            RUNNER_LABEL="ubuntu-latest"
            ;;
          codex)
            RUNNER_LABEL="${INPUT_CODEX_RUNNER_LABEL:-codex}"
            CODEX_REASONING_EFFORT="${INPUT_CODEX_REASONING_EFFORT:-xhigh}"
            CODEX_AGENT_TIMEOUT="${INPUT_CODEX_AGENT_TIMEOUT:-1800}"
            CODEX_VERSION="${INPUT_CODEX_VERSION:-latest}"
            if [[ -z "$RUNNER_LABEL" ]]; then
              echo "Codex runner label must not be empty" >&2
              exit 1
            fi
            if ! [[ "$CODEX_AGENT_TIMEOUT" =~ ^[0-9]+$ ]]; then
              echo "Codex agent timeout must be a non-negative integer" >&2
              exit 1
            fi
            ;;
          *)
            echo "Unsupported provider: $PROVIDER" >&2
            exit 1
            ;;
        esac

        {
          echo "provider=$PROVIDER"
          echo "runner_label=$RUNNER_LABEL"
          echo "codex_reasoning_effort=$CODEX_REASONING_EFFORT"
          echo "codex_agent_timeout=$CODEX_AGENT_TIMEOUT"
          echo "codex_version=$CODEX_VERSION"
        } >> "$GITHUB_OUTPUT"

  collect-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: read
    outputs:
      matrix: ${{ steps.get-issues.outputs.matrix }}
      has_issues: ${{ steps.get-issues.outputs.has_issues }}
    steps:
    - name: Get open issues
      id: get-issues
      env:
        GH_TOKEN: ${{ github.token }}
        INPUT_ISSUE_NUMBER: ${{ inputs.issue_number }}
      run: |
        if [ -n "$INPUT_ISSUE_NUMBER" ]; then
          if ! [[ "$INPUT_ISSUE_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "issue_number must be a numeric issue ID" >&2
            exit 1
          fi
          ISSUES=$(jq -cn --arg n "$INPUT_ISSUE_NUMBER" '[{number: ($n | tonumber)}]')
        else
          ISSUES=$(gh issue list --repo "$GITHUB_REPOSITORY" \
            --state open --author claytono --json number --limit 100)
        fi
        COUNT=$(echo "$ISSUES" | jq 'length')
        echo "Found $COUNT open issues"
        if [ "$COUNT" -eq 0 ]; then
          {
            echo "has_issues=false"
            echo 'matrix={"issue":[]}'
          } >> "$GITHUB_OUTPUT"
        else
          MATRIX=$(echo "$ISSUES" | jq -c '{issue: [.[].number]}')
          {
            echo "has_issues=true"
            echo "matrix=$MATRIX"
          } >> "$GITHUB_OUTPUT"
        fi

  triage-issue:
    name: 'Triage #${{ matrix.issue }}'
    runs-on: ${{ needs.resolve-provider.outputs.runner_label }}
    needs: [collect-issues, resolve-provider]
    if: needs.collect-issues.outputs.has_issues == 'true'
    permissions:
      contents: read
      issues: read
      pull-requests: read
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.collect-issues.outputs.matrix) }}
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      with:
        persist-credentials: false

    - name: Install Nix
      uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c  # v31
      with:
        github_access_token: ${{ github.token }}

    - name: Setup Cachix
      uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71  # v17
      with:
        name: claytono
        authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

    - name: Setup Nix environment
      run: |
        # Export nix flake environment to GITHUB_ENV for subsequent steps
        # Using eval to directly apply the environment (like setup-nix.sh does)
        eval "$(nix print-dev-env)"
        echo "PATH=$PATH" >> "$GITHUB_ENV"

    - name: Install investigation skills
      run: |
        git clone --depth 1 https://github.com/obra/superpowers .tmp/superpowers
        mkdir -p .claude/skills
        cp -r .tmp/superpowers/skills/systematic-debugging .claude/skills/
        cp -r .tmp/superpowers/skills/verification-before-completion .claude/skills/
        ls -la .claude/skills/

    - name: Generate issue triage prompt
      env:
        PROMPT: |-
          # Issue Triage for  #${{ matrix.issue }}

          Repository: ${{ github.repository }}
          Dry Run: ${{ inputs.dry_run || 'false' }}

          ## ENVIRONMENT

          All tools from the repo's flake.nix are available directly (skopeo, kubectl, helm, jq, etc.).

          Example: `skopeo list-tags docker://ghcr.io/example/image`

          You can run ANY bash command. There are no tool restrictions.

          **IMPORTANT: You have READ-ONLY access to GitHub.**
          - You CAN read issues, PRs, and comments
          - You CANNOT post comments, modify labels, or make any changes
          - Write your triage result to `/tmp/triage-result.json` (see OUTPUT FORMAT below)

          ## INVESTIGATION METHODOLOGY - MANDATORY

          **STOP. Before doing ANYTHING else, you MUST read these skill files:**

          ```
          .claude/skills/systematic-debugging/SKILL.md
          .claude/skills/verification-before-completion/SKILL.md
          ```

          **This is NOT optional.** Read BOTH skill files NOW and follow their methodology:
          - `systematic-debugging`: How to investigate upstream issues thoroughly
          - `verification-before-completion`: How to verify your findings before concluding

          These skills teach you to:
          - Follow ALL links found in issues/comments to check their status
          - Verify claims independently (if comment says "fixed in v2.0", check if v2.0 exists)
          - Don't trust - verify. Check actual state, not just what people say
          - If one approach doesn't find info, try alternatives (gh, curl, skopeo)

          **DO NOT SKIP THIS STEP.** Your triage quality depends on following these skills' discipline.

          ## STEP 1: FETCH THE ISSUE

          Run: `gh issue view ${{ matrix.issue }} --json number,title,body,labels,comments`

          ## STEP 2: CANDIDATE CHECK

          Determine if this issue is about being blocked on something external.

          **Examples of blocker-related issues:**
          - "Update X after upstream PR merges" with link to another repo's PR
          - "Waiting for v2.0 release" referencing an external project
          - "Blocked by upstream issue" with link to github.com, gitlab.com, codeberg.org

          **Examples of issues NOT about external blockers:**
          - Feature requests for this project
          - Bug reports about local code
          - Documentation improvements
          - Refactoring tasks

          **If NOT a candidate:** Write JSON with `action: "skip"` and stop.

          ## STEP 3: DEEP ANALYSIS (only for candidates)

          For each upstream reference found:

          - **GitHub PRs:** `gh pr view {url} --json state,mergedAt,title`
          - **GitHub Issues:** `gh issue view {url} --json state,stateReason,title`
          - **Other URLs:** Use curl or available web-fetching tools to check current status
          - **Container images:** Use `skopeo list-tags docker://{image}` to check available versions

          **IMPORTANT:** This repo uses Renovate for dependency updates. Even if an upstream
          PR is merged, we may still be blocked waiting for:
          - A new version to be released
          - Renovate to pick up and propose the update

          Check for existing Renovate PRs in this repo that might relate:
          ```bash
          gh pr list --label renovate --json number,title,state --limit 100
          ```

          Also check recently closed Renovate PRs (past 2 weeks). First get the date:
          ```bash
          date -u -d '2 weeks ago' +%Y-%m-%d
          ```
          Then use that date in the search:
          ```bash
          gh pr list --label renovate --state closed --search "closed:>YYYY-MM-DD" --json number,title,closedAt --limit 100
          ```

          This helps detect if we already updated via Renovate. If relevant Renovate PRs exist
          (open or recently closed), include links to them in your output.

          **IMPORTANT:** When you find alternatives mentioned in comments (e.g., "Qui" as alternative to qBittorrent SSO):
          - Search this repo: `grep -r "alternative-name" kubernetes/ ansible/`
          - Check if it's already deployed - this changes the recommendation
          - If deployed, the issue may be actionable NOW rather than blocked

          **Check intermediate dependencies:** When an upstream app releases a new version:
          - If we use a Helm chart: check if the chart's appVersion has been updated
          - `helm show chart <repo>/<chart>` or check the chart repo
          - A released app version doesn't help if the Helm chart still pins the old version
          - Note any gaps: "App v1.2.0 released, but Helm chart still at v1.1.0"

          **Search for recent upstream issues:** The linked issue may be outdated. Check for newer issues:
          ```bash
          gh issue list --repo <upstream-repo> --search "keyword created:>$(date -u -d '30 days ago' +%Y-%m-%d)" --json number,title,createdAt --limit 10
          ```
          Recent issues may have better context, workarounds, or show the problem persists.

          ## STEP 4: REVIEW ALL COMMENTS

          Read through ALL comments on the issue for context:
          - Human discussions may provide additional context
          - Other automation may have added relevant info
          - Previous triage comments (marked with `<!-- issue-triage:`) show historical
            status - extract the JSON state to compare against current state

          ## STEP 5: DETERMINE ACTION

          Only write a comment if:
          a) This is the FIRST triage (no previous triage comment), OR
          b) The status has CHANGED since last triage

          Compare this JSON to the previous triage comment's JSON. If the status and
          upstream states are identical, no new comment is needed.

          Labels must still be reconciled even when no new comment is needed:
          - BLOCKED issues should have the `blocked` label and should not have `unblocked`
          - UNBLOCKED issues should have the `unblocked` label and should not have `blocked`
          - Use `label_action` to declare the desired label state even when `action` is
            `no_change`

          **If status is unchanged:** Write JSON with `action: "no_change"` and set
          `label_action` to `"blocked"` or `"unblocked"` for the current status.

          ## STEP 6: OUTPUT FORMAT

          Write your triage result to `/tmp/triage-result.json` with this structure.
          After writing the file, output the comment_body content as readable markdown text so it's easy to review in the logs.

          ```json
          {
            "action": "comment",
            "status": "BLOCKED",
            "label_action": "blocked",
            "comment_body": "<!-- issue-triage:v1:{...} -->\n## Issue Triage Report\n\n**Status:** BLOCKED\n\n..."
          }
          ```

          **Note:** Do NOT include `issue_number` - it's determined by the workflow.

          **Action values:**
          - `"skip"` - Issue is not about external blockers (no comment needed)
          - `"no_change"` - Status unchanged since last triage (no comment needed;
            labels may still be updated)
          - `"comment"` - Post the comment and update labels

          **Label action values:**
          - `"blocked"` - Ensure the `blocked` label is present and `unblocked` is absent
          - `"unblocked"` - Ensure the `unblocked` label is present and `blocked` is absent
          - `"none"` - Don't change labels

          **Comment format (for comment_body):**

          ```
          <!-- issue-triage:v1:STATE_JSON -->
          ## Issue Triage Report

          **Status:** BLOCKED | UNBLOCKED

          ### Upstream Dependencies

          **PR/Issue: [Title](url)**
          - State: Open/Merged/Closed
          - Created: date
          - Last activity: date
          - Notable: Any important comments, reviewer feedback, blockers
          - Link: full url

          ### What's Needed (for BLOCKED status)
          - What needs to happen for this to become unblocked
          - Examples: PR needs to merge, issue needs resolution, version needs release
          - If waiting for new version: mention Renovate will create a PR when available

          ### What Changed (only on status changes, not first assessment)
          - Previous status
          - What changed to trigger this update
          ```

          **STATE_JSON** is a compact JSON object embedded in the HTML comment to track state:
          `{"status":"BLOCKED","upstreams":[{"url":"...","state":"open"}]}`
      run: |
        printf '%s\n' "$PROMPT" > /tmp/issue-triage-prompt.md

    - name: Setup Node for Codex
      if: needs.resolve-provider.outputs.provider == 'codex'
      uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38  # v6
      with:
        node-version: '24'

    - name: Install Codex CLI
      if: needs.resolve-provider.outputs.provider == 'codex'
      env:
        CODEX_VERSION: ${{ needs.resolve-provider.outputs.codex_version }}
      run: npm install -g "@openai/codex@$CODEX_VERSION"

    - name: Install Claude CLI
      if: needs.resolve-provider.outputs.provider == 'claude'
      run: npm install -g @anthropic-ai/claude-code

    - name: Run Codex Issue Triage
      if: needs.resolve-provider.outputs.provider == 'codex'
      env:
        GH_TOKEN: ${{ github.token }}
        CODEX_AGENT_TIMEOUT: ${{ needs.resolve-provider.outputs.codex_agent_timeout }}
        CODEX_REASONING_EFFORT: ${{ needs.resolve-provider.outputs.codex_reasoning_effort }}
      run: |
        set -o pipefail
        export CODEX_HOME="${HOME}/.codex"
        mkdir -p "$CODEX_HOME"

        args=(
          exec
          --cd "$GITHUB_WORKSPACE"
          --json
          --output-last-message /tmp/codex-last-message.md
          --dangerously-bypass-approvals-and-sandbox
        )
        if [[ -n "$CODEX_REASONING_EFFORT" ]]; then
          args+=(
            -c
            "model_reasoning_effort=$(jq -cn --arg effort "$CODEX_REASONING_EFFORT" '$effort')"
          )
        fi
        args+=(-)

        if [[ "$CODEX_AGENT_TIMEOUT" == "0" ]]; then
          codex "${args[@]}" < /tmp/issue-triage-prompt.md | tee /tmp/codex-output.jsonl
        else
          timeout "$CODEX_AGENT_TIMEOUT" codex "${args[@]}" < /tmp/issue-triage-prompt.md | tee /tmp/codex-output.jsonl
        fi

        if [[ ! -f /tmp/triage-result.json ]]; then
          echo "Codex did not write /tmp/triage-result.json" >&2
          if [[ -f /tmp/codex-last-message.md ]]; then
            cat /tmp/codex-last-message.md >&2
          fi
          exit 1
        fi

    - name: Run Claude Issue Triage
      if: needs.resolve-provider.outputs.provider == 'claude'
      env:
        GH_TOKEN: ${{ github.token }}
        CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      run: |
        set -o pipefail

        claude -p \
          --model opus \
          --permission-mode bypassPermissions \
          --output-format json \
          < /tmp/issue-triage-prompt.md \
          | tee /tmp/claude-output.json

        if [[ ! -f /tmp/triage-result.json ]]; then
          echo "Claude did not write /tmp/triage-result.json" >&2
          exit 1
        fi

    - name: Rename triage result with issue number
      env:
        ISSUE_NUMBER: ${{ matrix.issue }}
      run: |
        if [ -f /tmp/triage-result.json ]; then
          cp /tmp/triage-result.json "/tmp/triage-result-${ISSUE_NUMBER}.json"
        fi

    - name: Upload triage result
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
      with:
        name: triage-result-${{ matrix.issue }}
        path: /tmp/triage-result-${{ matrix.issue }}.json
        if-no-files-found: warn

    - name: Display triage result
      if: always()
      env:
        ISSUE_NUMBER: ${{ matrix.issue }}
      run: |
        echo "=== Triage Result for Issue #${ISSUE_NUMBER} ==="
        if [ -f /tmp/triage-result.json ]; then
          echo "--- JSON Structure ---"
          jq . /tmp/triage-result.json
          echo ""
          echo "--- Comment Preview ---"
          jq -r '.comment_body // "No comment body"' /tmp/triage-result.json
        else
          echo "No triage result file found"
        fi

  post-results:
    name: Post Results
    runs-on: ubuntu-latest
    needs: [collect-issues, triage-issue]
    if: needs.collect-issues.outputs.has_issues == 'true' && inputs.dry_run != true
    permissions:
      issues: write
    steps:
    - name: Download all triage results
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
      with:
        path: /tmp/results
        pattern: triage-result-*

    - name: Post comments and manage labels
      env:
        GH_TOKEN: ${{ github.token }}
      run: |-
        shopt -s nullglob

        # download-artifact v7 extracts single artifacts flat (no subdirectory)
        # but creates subdirectories for multiple artifacts. Collect JSON files
        # from both layouts into a single list.
        result_files=()
        for f in /tmp/results/triage-result-*.json; do
          result_files+=("$f")
        done
        for f in /tmp/results/triage-result-*/triage-result-*.json; do
          result_files+=("$f")
        done

        if [ ${#result_files[@]} -eq 0 ]; then
          echo "WARNING: No triage result files found"
          ls -laR /tmp/results/ 2>/dev/null || echo "Results directory does not exist"
          exit 0
        fi

        create_label_output=""
        if ! create_label_output=$(gh label create unblocked --repo "$GITHUB_REPOSITORY" \
            --color 0e8a16 \
            --description "External blocker cleared; ready for follow-up" 2>&1); then
          if ! printf '%s\n' "$create_label_output" | grep -Fqi "already exists"; then
            printf '%s\n' "$create_label_output" >&2
            exit 1
          fi
        fi

        ensure_label_state() {
          local issue="$1"
          local desired="$2"
          local current_labels

          case "$desired" in
            none|"")
              return 0
              ;;
          esac

          current_labels=$(gh issue view "$issue" --repo "$GITHUB_REPOSITORY" \
            --json labels --jq '[.labels[].name]')

          has_label() {
            echo "$current_labels" | jq -e --arg label "$1" 'index($label) != null' >/dev/null
          }

          case "$desired" in
            blocked|add)
              if ! has_label blocked; then
                gh issue edit "$issue" --repo "$GITHUB_REPOSITORY" --add-label blocked
              fi
              if has_label unblocked; then
                gh issue edit "$issue" --repo "$GITHUB_REPOSITORY" --remove-label unblocked
              fi
              ;;
            unblocked|remove)
              if has_label blocked; then
                gh issue edit "$issue" --repo "$GITHUB_REPOSITORY" --remove-label blocked
              fi
              if ! has_label unblocked; then
                gh issue edit "$issue" --repo "$GITHUB_REPOSITORY" --add-label unblocked
              fi
              ;;
            *)
              echo "ERROR: Unsupported label_action '$desired' for issue #$issue" >&2
              exit 1
              ;;
          esac
        }

        for result_file in "${result_files[@]}"; do
          # Extract issue number from filename (triage-result-123.json -> 123)
          # This avoids prompt injection by not trusting Claude's JSON output
          ISSUE=$(basename "$result_file" .json | sed 's/triage-result-//')

          RESULT=$(cat "$result_file")
          ACTION=$(echo "$RESULT" | jq -r '.action')
          LABEL_ACTION=$(echo "$RESULT" | jq -r '.label_action // "none"')

          echo "Processing issue #$ISSUE: action=$ACTION label_action=$LABEL_ACTION"

          if [ "$ACTION" = "skip" ]; then
            echo "  No action needed"
            continue
          fi

          if [ "$ACTION" = "comment" ]; then
            COMMENT=$(echo "$RESULT" | jq -r '.comment_body')
            echo "$COMMENT" | gh issue comment "$ISSUE" --repo "$GITHUB_REPOSITORY" -F -
          elif [ "$ACTION" = "no_change" ]; then
            echo "  No comment needed"
          else
            echo "ERROR: Unsupported action '$ACTION' for issue #$ISSUE" >&2
            exit 1
          fi

          ensure_label_state "$ISSUE" "$LABEL_ACTION"
        done
