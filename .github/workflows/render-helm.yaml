---
name: Render Helm Charts

on:
  pull_request:
    types:
    - opened
    - synchronize
    - reopened
  push:
    branches:
    - main

permissions:
  contents: write

jobs:
  render:
    name: Render Helm Charts
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
      with:
        fetch-depth: 0
        token: ${{ github.token }}
        persist-credentials: false
        ref: ${{ github.event.pull_request.head.ref || github.ref }}

    - name: Check for Kubernetes/Helm-related changes
      uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706  # v4
      id: changes
      with:
        filters: |
          need-render-helm:
            - 'kubernetes/**'
            - 'flake.nix'
            - 'flake.lock'
            - '.github/workflows/render-helm.yaml'

    - name: Install Nix
      if: steps.changes.outputs.need-render-helm == 'true'
      uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342  # v31
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Cachix
      if: steps.changes.outputs.need-render-helm == 'true'
      uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71  # v17
      with:
        name: claytono
        authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

    - name: Cache pre-commit
      if: steps.changes.outputs.need-render-helm == 'true'
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6
      with:
        path: ~/.cache/pre-commit
        key: ${{ runner.os }}-precommit-${{ hashFiles('.pre-commit-config.yaml') }}
        restore-keys: |
          ${{ runner.os }}-precommit-

    - name: Install pre-commit hooks
      if: steps.changes.outputs.need-render-helm == 'true'
      run: nix develop --command pre-commit install

    - name: Render changed charts
      if: steps.changes.outputs.need-render-helm == 'true'
      env:
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        PUSH_BEFORE_SHA: ${{ github.event.before }}
        PUSH_HEAD_SHA: ${{ github.sha }}
      run: |
        if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
          BASE_SHA=$PR_BASE_SHA
          HEAD_SHA=$PR_HEAD_SHA
        else
          BASE_SHA=$PUSH_BEFORE_SHA
          HEAD_SHA=$PUSH_HEAD_SHA
        fi
        echo "Comparing $BASE_SHA..$HEAD_SHA"
        git diff --name-only -z $BASE_SHA $HEAD_SHA \
          | xargs -0 -r -n1 dirname \
          | sort -u \
          | while read -r dir; do
              if [ -f "$dir/render" ]; then
                echo "⏳ Rendering in $dir"
                pushd "$dir"
                nix develop --command ./render
                popd
              else
                echo "⏭  Skipping $dir (no render script)"
              fi
            done

    - name: Check for changes
      if: steps.changes.outputs.need-render-helm == 'true' && github.ref == 'refs/heads/main'
      run: |
        if ! git diff --quiet; then
          echo "Helm manifests need to be regenerated on main branch!"
          git diff --stat
          exit 1
        fi

    - name: Commit regenerated manifests
      if: steps.changes.outputs.need-render-helm == 'true' && github.event_name ==
        'pull_request'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        if ! git diff --cached --quiet; then
          nix develop --command git commit -m "chore: regenerate Helm manifests"
        fi

    - name: Push changes via PAT
      if: steps.changes.outputs.need-render-helm == 'true' && github.event_name ==
        'pull_request'
      env:
        PAT_TOKEN: ${{ secrets.PAT }}
      run: |-
        BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF##*/}}"
        echo "Pushing to branch: $BRANCH_NAME"
        git push "https://x-access-token:${PAT_TOKEN}@github.com/${GITHUB_REPOSITORY}" "HEAD:${BRANCH_NAME}"
