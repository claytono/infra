- name: Include variables depending on flavor
  ansible.builtin.include_vars:
    file: "flavor_{{ containerd_flavor }}.yml"
  tags:
    - containerd-install

- name: Create containerd temporary directory
  ansible.builtin.file:
    path: "{{ containerd_tmp_directory }}"
    state: directory
    mode: "0700"
    owner: root
    group: root
  tags:
    - containerd-install
    - containerd-config

- name: Downloading containerd archive
  ansible.builtin.get_url:
    url: "{{ containerd_url }}"
    dest: "{{ containerd_tmp_directory }}/containerd.tar.gz"
    checksum: "sha256:{{ containerd_url }}.sha256sum"
    mode: "0600"
  tags:
    - containerd-install
    - containerd-download

- name: Unarchive containerd
  ansible.builtin.unarchive:
    src: "{{ containerd_tmp_directory }}/containerd.tar.gz"
    dest: "{{ containerd_tmp_directory }}"
    remote_src: true
  tags:
    - containerd-install
    - containerd-unarchive

- name: Copy containerd binaries to destination directory
  ansible.builtin.copy:
    src: "{{ containerd_tmp_directory }}{{ containerd_binaries_src_directory }}/{{ binary }}"
    dest: "{{ containerd_binary_directory }}/{{ binary }}"
    mode: "{{ containerd_binary_mode }}"
    owner: "{{ containerd_owner | default(omit) }}"
    group: "{{ containerd_group | default(omit) }}"
    remote_src: true
  loop: "{{ containerd_binaries }}"
  loop_control:
    loop_var: "binary"
  notify:
    - Restart containerd
  tags:
    - containerd-install

- name: Create directory for containerd configuration file
  ansible.builtin.file:
    path: "{{ containerd_config_directory }}"
    state: directory
    mode: "0755"
    owner: root
    group: root
  tags:
    - containerd-install
    - containerd-config

- name: Compute containerd import globs
  ansible.builtin.set_fact:
    containerd__config_import_globs: >-
      {{
        (containerd_config_imports | default([]) | map(attribute='glob') | list)
        if (containerd_config_imports is sequence and (containerd_config_imports | length > 0) and (containerd_config_imports[0] is mapping))
        else (containerd_config_imports | default([]) | list)
      }}
  tags:
    - containerd-install
    - containerd-config

- name: Define newline helper for config rendering
  ansible.builtin.set_fact:
    # YAML double-quoted "\n" becomes a real newline character.
    containerd__nl: "\n"
  tags:
    - containerd-install
    - containerd-config

- name: Render containerd config (optionally inject imports)
  ansible.builtin.set_fact:
    containerd__config_rendered: >-
      {{
        containerd_config
        if (
          (containerd__config_import_globs | length == 0)
          or (containerd_config is regex('(?m)^\s*imports\s*='))
        )
        else (
          (containerd_config.splitlines()[:1] | join(containerd__nl))
          ~ containerd__nl
          ~ 'imports = [' ~ (containerd__config_import_globs | map('to_json') | join(', ')) ~ ']'
          ~ containerd__nl
          ~ (containerd_config.splitlines()[1:] | join(containerd__nl))
          ~ containerd__nl
        )
      }}
  tags:
    - containerd-install
    - containerd-config

- name: Create containerd configuration file
  ansible.builtin.copy:
    content: "{{ containerd__config_rendered }}"
    dest: "{{ containerd_config_directory }}/config.toml"
    owner: root
    group: root
    mode: "0644"
  notify:
    - Restart containerd
  tags:
    - containerd-install
    - containerd-config


- name: Manage containerd drop-in config directories and files
  ansible.builtin.include_tasks: manage_import.yml
  when:
    - containerd_config_imports is sequence
    - containerd_config_imports | length > 0
    - containerd_config_imports[0] is mapping
  loop: "{{ containerd_config_imports | default([]) }}"
  loop_control:
    loop_var: containerd__import
    label: "{{ containerd__import.glob }}"
  tags:
    - containerd-install
    - containerd-config

- name: Validate containerd configuration (main + imports)
  when: containerd_validate_config | bool
  ansible.builtin.command:
    cmd: "{{ containerd_binary_directory }}/containerd --config {{ containerd_config_directory }}/config.toml config dump"
  register: containerd__config_dump
  changed_when: false
  tags:
    - containerd-install
    - containerd-config

- name: Find location of modprobe binary
  ansible.builtin.stat:
    path: "{{ path }}"
  loop:
    - /usr/bin/modprobe
    - /usr/sbin/modprobe
    - /sbin/modprobe
  loop_control:
    loop_var: path
  register: modprobe_locations
  tags:
    - containerd_install

- name: Set modprobe_location
  ansible.builtin.set_fact:
    modprobe_location: "{{ modprobe_locations.results | selectattr('stat.exists', '==', True) | map(attribute='path') | first }}"
  tags:
    - containerd_install

- name: Modprobe path
  ansible.builtin.debug:
    msg: "Using {{ modprobe_location }} in containerd.service"
  tags:
    - containerd-install

- name: Create containerd.service systemd file
  ansible.builtin.template:
    src: etc/systemd/system/containerd.service.j2
    dest: /etc/systemd/system/containerd.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart containerd
  tags:
    - containerd-install
    - containerd-systemd

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Enable and start containerd
  ansible.builtin.service:
    name: containerd
    enabled: true
    state: started
  tags:
    - containerd-systemd
