---
- name: "Install python3-debian for deb822_repository"
  ansible.builtin.apt:
    name: python3-debian
    state: present

- name: "Add Netdata APT repository"
  ansible.builtin.deb822_repository:
    name: netdata-stable
    types: deb
    uris: https://repository.netdata.cloud/repos/stable/debian/
    suites: "{{ ansible_facts['distribution_release'] }}/"
    signed_by: https://repository.netdata.cloud/netdatabot.gpg.key
    state: present
    enabled: true
  register: netdata_repo

- name: "Create netdata package pin for version"
  ansible.builtin.copy:
    dest: "/etc/apt/preferences.d/netdata"
    content: |
      Package: netdata*
      Pin: version {{ netdata_version }}*
      Pin-Priority: 900
    mode: "0644"

- name: "Install Netdata"
  ansible.builtin.apt:
    name:
      - "netdata={{ netdata_version }}"
      - "netdata-user={{ netdata_version }}"
    state: present
    update_cache: "{{ netdata_repo is changed }}"
    allow_downgrade: true

- name: "Deploy Netdata configuration"
  ansible.builtin.template:
    src: netdata.conf.j2
    dest: /etc/netdata/netdata.conf
    owner: root
    group: netdata
    mode: "0644"
  notify: Restart netdata

- name: "Deploy Netdata streaming configuration"
  ansible.builtin.template:
    src: stream.conf.j2
    dest: /etc/netdata/stream.conf
    owner: root
    group: netdata
    mode: "0640"
  notify: Restart netdata

- name: Ensure netdata go.d config directory exists
  ansible.builtin.file:
    path: /etc/netdata/go.d
    state: directory
    owner: root
    group: netdata
    mode: "0755"
  when: "'docker' in group_names"

- name: Deploy netdata Docker collector config
  ansible.builtin.copy:
    content: |
      # Managed by Ansible - do not edit
      # Reduce polling from default 1s to 5s to lower dockerd/containerd CPU
      jobs:
        - name: local
          address: 'unix:///var/run/docker.sock'
          timeout: 2
          collect_container_size: no
          update_every: 5
    dest: /etc/netdata/go.d/docker.conf
    owner: root
    group: netdata
    mode: "0644"
  when: "'docker' in group_names"
  notify: Restart netdata

- name: "Enable and start Netdata service"
  ansible.builtin.service:
    name: netdata
    state: started
    enabled: true
