---
- name: Ensure resticprofile client user exists
  ansible.builtin.user:
    name: "{{ resticprofile_client_user }}"
    state: present
  register: resticprofile_user_info

- name: Create resticprofile configuration directory
  ansible.builtin.file:
    path: "{{ resticprofile_user_info.home }}/.config/resticprofile"
    state: directory
    mode: "0700"
    owner: "{{ resticprofile_client_user }}"

- name: Write passphrase to file
  ansible.builtin.copy:
    content: "{{ restic_passphrase }}"
    dest: "{{ resticprofile_user_info.home }}/.config/resticprofile/passphrase.txt"
    owner: "{{ resticprofile_client_user }}"
    mode: "0600"
  no_log: true

- name: Write template passphrase to file
  ansible.builtin.copy:
    content: "{{ restic_template_password }}"
    dest: "{{ resticprofile_user_info.home }}/.config/resticprofile/template-passphrase.txt"
    owner: "{{ resticprofile_client_user }}"
    mode: "0600"
  no_log: true
  when: restic_template_password is defined

- name: Remove template passphrase file when template password is undefined
  ansible.builtin.file:
    path: "{{ resticprofile_user_info.home }}/.config/resticprofile/template-passphrase.txt"
    state: absent
  when: restic_template_password is not defined

- name: Deploy body template files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ resticprofile_user_info.home }}/.config/resticprofile/{{ item }}"
    owner: "{{ resticprofile_client_user }}"
    mode: "0644"
  loop:
    - body-start.txt
    - body-success.txt
    - body-failure.txt

- name: Write config file
  ansible.builtin.template:
    src: templates/config.j2
    dest: "{{ resticprofile_user_info.home }}/.config/resticprofile/profiles.yaml"
    owner: "{{ resticprofile_client_user }}"
    mode: "0600"
  register: resticprofile_config_file
  no_log: true

- name: Check whether restic repository is initialized
  ansible.builtin.command:
    argv:
      - "{{ resticprofile_bin_dir }}/resticprofile"
      - -c
      - "{{ resticprofile_user_info.home }}/.config/resticprofile/profiles.yaml"
      - -n
      - default
      - cat
      - config
  become: true
  become_user: "{{ resticprofile_client_user }}"
  register: resticprofile_repository_config
  check_mode: false
  changed_when: false
  failed_when: false
  no_log: true

- name: Record restic repository initialization state
  ansible.builtin.set_fact:
    resticprofile_repository_missing: >-
      {{
        resticprofile_repository_config.rc != 0 and
        (
          (resticprofile_repository_config.stdout ~ resticprofile_repository_config.stderr)
          is search('Is there a repository at the following location|repository does not exist')
        )
      }}
    resticprofile_repository_check_failed: >-
      {{
        resticprofile_repository_config.rc != 0 and
        not (
          (resticprofile_repository_config.stdout ~ resticprofile_repository_config.stderr)
          is search('Is there a repository at the following location|repository does not exist')
        )
      }}

- name: Fail when restic repository check returned an unexpected error
  ansible.builtin.fail:
    msg: >-
      resticprofile repository check failed unexpectedly with rc={{ resticprofile_repository_config.rc }}.
  when: resticprofile_repository_check_failed

- name: Fail when missing repository needs unsynced template password
  ansible.builtin.fail:
    msg: >-
      Restic repository is missing, but restic_template_password is not defined.
      Run kubernetes/restic/render-and-sync --secrets after authenticating 1Password.
  when:
    - resticprofile_repository_missing
    - restic_template_password is not defined

- name: Report missing restic repository in check mode
  ansible.builtin.debug:
    msg: Restic repository is missing and would be initialized with resticprofile init.
  changed_when: true
  when:
    - ansible_check_mode
    - resticprofile_repository_missing
    - restic_template_password is defined

- name: Initialize missing restic repository
  ansible.builtin.command:
    argv:
      - "{{ resticprofile_bin_dir }}/resticprofile"
      - -c
      - "{{ resticprofile_user_info.home }}/.config/resticprofile/profiles.yaml"
      - -n
      - default
      - init
  become: true
  become_user: "{{ resticprofile_client_user }}"
  no_log: true
  when:
    - not ansible_check_mode
    - resticprofile_repository_missing
    - restic_template_password is defined

- name: Check if resticprofile schedules are up to date
  ansible.builtin.command: "{{ resticprofile_bin_dir }}/resticprofile status"
  register: resticprofile_status
  changed_when: false
  when: resticprofile_enable_scheduling

- name: Unschedule existing jobs if config changed or upgrading
  ansible.builtin.command: "{{ resticprofile_bin_dir }}/resticprofile unschedule --all"
  when:
    - resticprofile_enable_scheduling
    - resticprofile_status.stdout is not search('not found$')
    - resticprofile_install_resticprofile or resticprofile_config_file.changed
  register: resticprofile_unschedule_result
  failed_when: false

- name: Update resticprofile schedules
  ansible.builtin.command: "{{ resticprofile_bin_dir }}/resticprofile schedule"
  when:
    - resticprofile_enable_scheduling
    - resticprofile_status is defined
    - (resticprofile_status.stdout is search("not found$") or resticprofile_config_file.changed or resticprofile_install_resticprofile)
