---
- name: Install Python if needed
  hosts: all
  gather_facts: false

  roles:
    - role: install_python
      when: "setup_upgrade | default(false) | bool"
      tags: setup_upgrade

- name: System upgrade
  hosts: all
  roles:
    - role: setup_upgrade
      when: "setup_upgrade | default(false) | bool"
      tags: setup_upgrade

- name: Hostname management
  hosts: all
  roles:
    - role: hostname
      tags: hostname

- name: Common role
  hosts: all
  roles:
    - role: common
      tags: common

- name: User group management
  hosts: all
  tags: users
  roles:
    - anxs.generic-users
  tasks:
    - name: Get user groups
      ansible.builtin.getent:
        database: group

    - name: Add coneill to groups if they exist
      ansible.builtin.user:
        name: "coneill"
        groups: "{{ item }}"
        append: true
      when: item in ansible_facts.getent_group
      loop:
        - libvirt

- name: Proxmox configuration
  hosts: proxmox
  roles:
    - role: proxmox
      tags: proxmox

- name: SSH hardening
  hosts: all
  tags: [users, ssh]
  tasks:
    - name: "Ensure SSH drop-in config directory exists"
      ansible.builtin.file:
        path: /etc/ssh/sshd_config.d
        state: directory
        mode: "0755"
        owner: root
        group: root

    - name: "Configure SSH to allow root login only with keys"
      ansible.builtin.copy:
        content: |
          # Ansible managed - allow root SSH login only with keys, not passwords
          PermitRootLogin prohibit-password
        dest: "/etc/ssh/sshd_config.d/01-root-keys-only.conf"
        mode: "0644"
        owner: root
        group: root
      notify:
        - Validate sshd configuration
        - Restart sshd

  handlers:
    - name: Validate sshd configuration
      ansible.builtin.command: /usr/sbin/sshd -t
      changed_when: false
      when: sshd_config_validation | default(true) | bool

    - name: Restart sshd
      ansible.builtin.service:
        name: ssh
        state: restarted
      when: sshd_config_validation | default(true) | bool

- name: Network roles
  hosts: all
  tags: network
  any_errors_fatal: true
  pre_tasks:
    # Fresh Raspberry Pi OS hosts start with NetworkManager owning the active
    # interface. Stage the normal ifupdown config with the existing network
    # roles, then intentionally stop before handlers or NetworkManager removal.
    # After a reboot, ifupdown owns the interface and the rerun can safely purge
    # NetworkManager.
    - name: Detect interfaces managed by ifupdown config
      ansible.builtin.set_fact:
        network_bootstrap_managed_interfaces: >-
          {{
            (
              (interfaces_ether_interfaces | default([]))
              + (interfaces_bridge_interfaces | default([]))
              + (interfaces_bond_interfaces | default([]))
            )
            | map(attribute='device')
            | list
          }}

    - name: Gather service facts
      ansible.builtin.service_facts:
      when:
        - manage_network | default(false) | bool

    - name: Record NetworkManager service state
      ansible.builtin.set_fact:
        network_bootstrap_network_manager_active: >-
          {{
            ansible_facts.services["NetworkManager.service"] is defined
            and ansible_facts.services["NetworkManager.service"].state == "running"
          }}

    - name: Check whether managed interfaces are already ifupdown-managed
      ansible.builtin.command: "grep -q '^{{ item }}=' /run/network/ifstate"
      register: network_bootstrap_ifupdown_state
      changed_when: false
      failed_when: false
      loop: "{{ network_bootstrap_managed_interfaces }}"
      when:
        - manage_network | default(false) | bool
        - network_bootstrap_managed_interfaces | length > 0

    - name: Record ifupdown-managed interfaces
      ansible.builtin.set_fact:
        network_bootstrap_ifupdown_managed_interfaces: >-
          {{
            network_bootstrap_ifupdown_state.results | default([])
            | selectattr('rc', 'equalto', 0)
            | map(attribute='item')
            | list
          }}

    - name: Decide whether network bootstrap reboot is required
      ansible.builtin.set_fact:
        network_bootstrap_reboot_required: >-
          {{
            manage_network | default(false) | bool
            and network_bootstrap_network_manager_active | default(false) | bool
            and network_bootstrap_managed_interfaces | length > 0
            and network_bootstrap_ifupdown_managed_interfaces | default([]) | length < network_bootstrap_managed_interfaces | length
          }}

  roles:
    - role: layereight.wifi
      when: "wifi_ssid is defined"
      tags: [wifi, network]
    - role: michaelrigart.interfaces
      become: true
      tags: network
      when: "manage_network | default(false) | bool"

  tasks:
    - name: Enable networking service for boot-time ifupdown activation
      ansible.builtin.service:
        name: networking
        enabled: true
      when:
        - network_bootstrap_reboot_required | default(false) | bool

    - name: Disable NetworkManager service on next boot
      ansible.builtin.systemd:
        name: NetworkManager.service
        enabled: false
      when:
        - network_bootstrap_reboot_required | default(false) | bool

    - name: Disable NetworkManager wait-online service on next boot
      ansible.builtin.systemd:
        name: NetworkManager-wait-online.service
        enabled: false
      failed_when: false
      when:
        - network_bootstrap_reboot_required | default(false) | bool

    - name: Stop for required network bootstrap reboot
      ansible.builtin.fail:
        msg: >-
          Network bootstrap config has been staged for {{ inventory_hostname }}.
          Reboot the host, wait for it to return on its static ifupdown address,
          then rerun this same playbook.
      when: network_bootstrap_reboot_required | default(false) | bool

    - name: Flush network handlers before NetworkManager removal
      ansible.builtin.meta: flush_handlers

    - name: Remove NetworkManager when managing network via interfaces
      ansible.builtin.apt:
        name: network-manager
        state: absent
        purge: true
      become: true
      tags: network
      when: "manage_network | default(false) | bool"

    - name: Wait for host after NetworkManager removal
      ansible.builtin.wait_for_connection:
        timeout: 90
      tags: network
      when: "manage_network | default(false) | bool"

- name: Security roles
  hosts: all
  roles:
    - role: boutetnico.fail2ban
      tags: fail2ban

- name: ZRAM swap
  hosts: all
  roles:
    - role: zram
      tags: zram

- name: Chrony, postfix, and resticprofile
  hosts: all
  roles:
    - role: chrony
      tags: chrony
    - role: oefenweb.postfix
      tags: postfix
    - role: resticprofile
      tags: [restic, resticprofile]

- name: Docker
  hosts: docker
  roles:
    - role: geerlingguy.docker
      tags: docker

- name: Traefik
  hosts: traefik
  roles:
    - role: traefik
      tags: traefik

- name: NUT
  hosts: nut
  roles:
    - role: nut
      tags: nut

- name: NUT clients
  hosts: nut_client
  roles:
    - role: nut
      tags: nut

- name: OS install server
  hosts: infra1
  roles:
    - role: os-install
      tags: os-install

- name: Tailscale
  hosts: all,!tailscale_disabled
  roles:
    - role: artis3n.tailscale.machine
      tags: tailscale

- name: RTL433 SDR receivers
  hosts: rtl433
  roles:
    - role: rtl433
      tags: rtl433

- name: ZWaveJS
  hosts: zwavejs
  roles:
    - role: zwavejs
      tags: zwavejs

- name: Zigbee2MQTT
  hosts: zigbee2mqtt
  roles:
    - role: zigbee2mqtt
      tags: zigbee2mqtt

- name: Matter (OTBR + Matter Server)
  hosts: matter
  roles:
    - role: matter
      tags: matter

- name: Kubernetes role
  hosts: kubernetes
  roles:
    - role: kubeadm
      tags: kubernetes

- name: Prometheus node exporter
  hosts: all
  tags: prom
  roles:
    - role: geerlingguy.node_exporter
      when: "node_exporter_enabled | default(false)"

  tasks:
    - name: Create textfile collector directory
      ansible.builtin.file:
        path: /var/lib/node_exporter/textfile_collector
        state: directory
        mode: "0755"
        owner: node_exporter
        group: node_exporter
      when: "node_exporter_enabled | default(false)"

- name: Netdata monitoring agent
  hosts: all,!kubernetes
  roles:
    - role: netdata
      when: "netdata_enabled | default(false)"
      tags: netdata

- name: Docker host maintenance
  hosts: docker
  tasks:
    - name: Prune unused Docker images
      community.docker.docker_prune:
        images: true
        images_filters:
          dangling: false
