---
# M5Stack AtomS3 Lite with a KMeterISO Unit on the Grove I2C port.
esphome:
  name: ${devicename}
  on_boot:
  - priority: 600
    then:
    - light.turn_on:
        id: ${device_id}_rgb_led
        brightness: 60%
        red: 100%
        green: 0%
        blue: 0%

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf

logger:

wifi:
  on_connect:
  - script.execute: ${device_id}_flash_green_led

i2c:
  sda: GPIO2
  scl: GPIO1
  frequency: 100kHz

light:
- platform: esp32_rmt_led_strip
  id: ${device_id}_rgb_led
  internal: true
  pin: GPIO35
  num_leds: 4
  rgb_order: GRB
  chipset: ws2812
  restore_mode: ALWAYS_OFF
  default_transition_length: 0s

script:
- id: ${device_id}_flash_green_led
  mode: restart
  then:
  - light.turn_on:
      id: ${device_id}_rgb_led
      brightness: 60%
      red: 0%
      green: 100%
      blue: 0%
  - delay: 5s
  - light.turn_off: ${device_id}_rgb_led

binary_sensor:
- platform: gpio
  id: ${device_id}_button
  pin:
    number: GPIO41
    mode: INPUT_PULLUP
    inverted: true
  name: ${human_devicename} Button
  entity_category: diagnostic
  filters:
  - delayed_off: 10ms
  on_press:
  - script.execute: ${device_id}_flash_green_led

sensor:
- platform: kmeteriso
  temperature:
    id: ${device_id}_temperature
    name: ${human_devicename} Temperature
  internal_temperature:
    id: ${device_id}_internal_temperature
    name: ${human_devicename} Internal Temperature
  update_interval: 10s
