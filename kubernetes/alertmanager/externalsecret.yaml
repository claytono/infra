---
apiVersion: external-secrets.io/v1
kind: ExternalSecret

metadata:
  name: alertmanager

spec:
  secretStoreRef:
    name: production
    kind: ClusterSecretStore
  data:
  - secretKey: SMTP_PASSWORD
    remoteRef:
      key: smtp-relay
      property: relay-password
  - secretKey: SLACK_WEBHOOK_URL
    remoteRef:
      key: alertmanager
      property: SLACK_WEBHOOK_URL
