---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: audiobookshelf
  annotations:
    reloader.stakater.com/auto: 'true'

spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: audiobookshelf
  template:
    metadata:
      labels:
        app: audiobookshelf
    spec:
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
      - name: audiobookshelf
        image: ghcr.io/advplyr/audiobookshelf:2.35.0@sha256:89276ff2e0b3d2f07dd334b641f27a34ab7f02e1047c60b7b8a30126cb0813a5
        ports:
        - containerPort: 13378
          name: http
        env:
        - name: PORT
          value: '13378'
        volumeMounts:
        - mountPath: /config
          name: config
        - mountPath: /metadata
          name: metadata
        - mountPath: /audiobooks
          name: audiobooks
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: audiobookshelf-config
      - name: metadata
        persistentVolumeClaim:
          claimName: audiobookshelf-metadata
      - name: audiobooks
        nfs:
          server: fs2.oneill.net
          path: /volume2/shared/books/audiobookshelf
