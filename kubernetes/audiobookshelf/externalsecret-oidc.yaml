---
apiVersion: external-secrets.io/v1
kind: ExternalSecret

metadata:
  name: audiobookshelf-oidc

spec:
  secretStoreRef:
    name: production
    kind: ClusterSecretStore
  data:
  - secretKey: OIDC_CLIENT_ID
    remoteRef:
      key: audiobookshelf-oidc
      property: client-id
  - secretKey: OIDC_CLIENT_SECRET
    remoteRef:
      key: audiobookshelf-oidc
      property: client-secret
  target:
    name: audiobookshelf-oidc
