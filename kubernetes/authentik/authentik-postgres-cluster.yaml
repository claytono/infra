---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster

metadata:
  name: authentik-postgres

spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-standard-trixie@sha256:d879dfab951cb0eef9beac367f259d08ea1c04ae84699526854ff9ae478656be
  enablePDB: true

  storage:
    size: 10Gi

  postgresql:
    parameters:
      max_connections: '200'

  bootstrap:
    initdb:
      database: authentik
      owner: authentik
