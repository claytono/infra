---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster

metadata:
  name: authentik-postgres

spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-standard-trixie@sha256:9f9f53c9e07e5b2924945e6eaeb9168f7e856786d221839866ac85ccd703b3ba
  enablePDB: true

  storage:
    size: 10Gi

  postgresql:
    parameters:
      max_connections: '200'

  bootstrap:
    initdb:
      database: authentik
      owner: authentik
