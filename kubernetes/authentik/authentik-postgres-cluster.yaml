---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster

metadata:
  name: authentik-postgres

spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4-standard-trixie@sha256:1534cac00fa02114adfd28d1ab11f73bc9821f2d19dd8e87ea166c14a637b8f4
  enablePDB: true

  storage:
    size: 10Gi

  postgresql:
    parameters:
      max_connections: '200'

  bootstrap:
    initdb:
      database: authentik
      owner: authentik
