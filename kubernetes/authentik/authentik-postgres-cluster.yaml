---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster

metadata:
  name: authentik-postgres

spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4-standard-trixie@sha256:7259c775ce18bdf668f17a68accb78e5bcc8074bbea9c8cdac974a8a8525a173
  enablePDB: true

  storage:
    size: 10Gi

  postgresql:
    parameters:
      max_connections: '200'

  bootstrap:
    initdb:
      database: authentik
      owner: authentik
