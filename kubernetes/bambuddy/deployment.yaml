---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: bambuddy
  namespace: bambuddy
  annotations:
    reloader.stakater.com/auto: 'true'

spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: bambuddy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bambuddy
      annotations:
        # Virtual printer needs a stable IoT LAN address. Multus adds a macvlan
        # interface at this fixed IP while the web UI stays on the pod network.
        k8s.v1.cni.cncf.io/networks: |-
          [{
            "name": "lan-172-19-74",
            "namespace": "kube-system",
            "interface": "vp-lan",
            "ips": ["172.19.74.29/24"]
          }]
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: bambuddy
        image: ghcr.io/maziggy/bambuddy:0.2.4.9@sha256:d68ab4746f18c51a6e22f5cd536533a4ae3c1eb48f4eecccbb68c2be23d0ef52
        args:
        - uvicorn
        - backend.app.main:app
        - --host
        - $(POD_IP)
        - --port
        - '8000'
        - --loop
        - asyncio
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            add:
            - NET_BIND_SERVICE
        env:
        - name: TZ
          value: America/New_York
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: PUID
          value: '1000'
        - name: PGID
          value: '1000'
        - name: LOG_TO_FILE
          value: 'false'
        - name: LOG_LEVEL
          value: INFO
        # Bambuddy formats this into FTP PASV responses, so it must be the
        # numeric IPv4 address on the macvlan network, not a DNS name.
        - name: VIRTUAL_PRINTER_PASV_ADDRESS
          value: 172.19.74.29
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: bambuddy-postgres-app
              key: DATABASE_URL
        - name: MFA_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: bambuddy-secrets
              key: MFA_ENCRYPTION_KEY
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: bambuddy-secrets
              key: JWT_SECRET_KEY
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 36
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: logs
          mountPath: /app/logs
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: bambuddy-data
      - name: logs
        emptyDir: {}
      - name: tmp
        emptyDir: {}
