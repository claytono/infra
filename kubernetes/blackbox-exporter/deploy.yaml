---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: exporter

spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: blackbox-exporter
      app.kubernetes.io/instance: blackbox-exporter
  template:
    metadata:
      name: blackbox-exporter
      labels:
        app.kubernetes.io/name: blackbox-exporter
        app.kubernetes.io/instance: blackbox-exporter
    spec:
      containers:
      - name: blackbox-exporter
        image: prom/blackbox-exporter:v0.28.0@sha256:e753ff9f3fc458d02cca5eddab5a77e1c175eee484a8925ac7d524f04366c2fc
        imagePullPolicy: IfNotPresent
        args:
        - --config.file=/config/config.yaml
        - --web.config.file=/web-config/web-config.yaml
        volumeMounts:
        - name: config
          mountPath: /config
        - name: web-config
          mountPath: /web-config
          readOnly: true
        - name: qbittorrent-api-key
          mountPath: /secrets
          readOnly: true
        ports:
        - containerPort: 9115
      volumes:
      - name: config
        configMap:
          name: config
      - name: web-config
        secret:
          secretName: blackbox-exporter-web-config
      - name: qbittorrent-api-key
        secret:
          secretName: qbittorrent
          items:
          - key: api-key
            path: qbittorrent-api-key
