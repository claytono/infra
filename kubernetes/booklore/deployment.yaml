---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: booklore
  namespace: booklore

spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: booklore
  template:
    metadata:
      labels:
        app: booklore
    spec:
      securityContext:
        fsGroup: 10001
      containers:
      - name: booklore
        image: ghcr.io/claytono/booklore:v2.1.0@sha256:2dc40d2068115596807ccd650f940bb749ee4549de1b09742de02b843f76925a
        ports:
        - containerPort: 6060
          name: http
        env:
        - name: BOOKLORE_PORT
          value: '6060'
        - name: DATABASE_URL
          value: jdbc:mariadb://mariadb.booklore.svc.cluster.local:3306/booklore?connectionTimeZone=UTC&forceConnectionTimeZoneToSession=true
        - name: DATABASE_USERNAME
          value: booklore
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb-secrets
              key: user-password
        - name: TZ
          value: EST5EDT
        - name: USER_ID
          value: '10001'
        - name: GROUP_ID
          value: '10001'
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: books
          mountPath: /books
        - name: bookdrop
          mountPath: /bookdrop
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: booklore-data
      - name: books
        nfs:
          server: fs2.oneill.net
          path: /volume2/shared/books/booklore
      - name: bookdrop
        nfs:
          server: fs2.oneill.net
          path: /volume2/shared/downloads/booklore-ingestion
