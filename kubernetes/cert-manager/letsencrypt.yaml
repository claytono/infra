---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer

metadata:
  name: letsencrypt

spec:
  acme:
    email: clayton@oneill.net
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: issuer-account-key
    solvers:
    - dns01:
        cloudflare:
          apiTokenSecretRef:
            name: cert-manager
            key: cloudflare-api-token
