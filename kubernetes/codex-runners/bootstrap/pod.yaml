---
apiVersion: v1
kind: Pod

metadata:
  name: codex-auth-bootstrap
  labels:
    codex-runner: 'true'
    app.kubernetes.io/name: codex-auth-bootstrap
    app.kubernetes.io/part-of: codex-runners

spec:
  restartPolicy: Never
  serviceAccountName: codex-runner
  automountServiceAccountToken: false
  securityContext:
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    fsGroupChangePolicy: OnRootMismatch
  dnsPolicy: None
  dnsConfig:
    nameservers:
    - 1.1.1.1
    - 1.0.0.1
  initContainers:
  - name: codex-home-permissions
    image: busybox:1.37@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
    command:
    - sh
    - -c
    - |
      chown -R 1001:1001 /home/runner/.codex
      chmod 700 /home/runner/.codex
      ls -ldn /home/runner/.codex
    securityContext:
      runAsUser: 0
      runAsGroup: 0
    volumeMounts:
    - name: codex-home
      mountPath: /home/runner/.codex
  containers:
  - name: codex-auth
    image: node:24-bookworm@sha256:050bf2bbe33c1d6754e060bec89378a79ed831f04a7bb1a53fe45e997df7b3bb
    command:
    - sleep
    - infinity
    env:
    - name: CODEX_HOME
      value: /home/runner/.codex
    - name: HOME
      value: /tmp
    - name: NPM_CONFIG_PREFIX
      value: /tmp/npm-global
    - name: PATH
      value: /tmp/npm-global/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumeMounts:
    - name: codex-home
      mountPath: /home/runner/.codex
  volumes:
  - name: codex-home
    persistentVolumeClaim:
      claimName: codex-home
