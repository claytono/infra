---
apiVersion: external-secrets.io/v1
kind: ExternalSecret

metadata:
  name: codex-runner-github

spec:
  secretStoreRef:
    name: production
    kind: ClusterSecretStore
  target:
    name: codex-runner-github
    creationPolicy: Owner
    template:
      type: Opaque
  data:
  - secretKey: github_token
    remoteRef:
      key: codex-runner-github
      property: github_token
