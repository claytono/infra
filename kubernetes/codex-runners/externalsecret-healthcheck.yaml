---
apiVersion: external-secrets.io/v1
kind: ExternalSecret

metadata:
  name: codex-auth-refresh-healthcheck

spec:
  refreshInterval: 24h
  secretStoreRef:
    name: production
    kind: ClusterSecretStore
  target:
    name: codex-auth-refresh-healthcheck
    creationPolicy: Owner
  data:
  - secretKey: HEALTHCHECK_PING_KEY
    remoteRef:
      key: healthchecks
      property: PING_KEY
