---
githubConfigUrl: https://github.com/claytono/infra
githubConfigSecret: codex-runner-github

controllerServiceAccount:
  namespace: actions-runner-system
  name: actions-runner-controller-gha-rs-controller

runnerScaleSetName: codex-infra
scaleSetLabels:
- codex

minRunners: 0
maxRunners: 8

template:
  metadata:
    labels:
      codex-runner: 'true'
      codex-runner-repo: infra
  spec:
    serviceAccountName: codex-runner
    securityContext:
      runAsUser: 1001
      runAsGroup: 1001
      fsGroup: 1001
      fsGroupChangePolicy: OnRootMismatch
      supplementalGroups:
      - 27
    dnsPolicy: None
    dnsConfig:
      nameservers:
      - 1.1.1.1
      - 1.0.0.1
    initContainers:
    - name: copy-codex-auth
      image: ghcr.io/astral-sh/uv:debian@sha256:29ebc32bfeb4f18edf3bc87c2ed9440816857cfd7fe95ca45d66b6fade0a4688
      command:
      - python3
      - /etc/codex-auth-tools/copy-auth-json.py
      env:
      - name: AUTH_SOURCE
        value: /auth/auth.json
      - name: CODEX_HOME
        value: /home/runner/.codex
      volumeMounts:
      - name: codex-auth
        mountPath: /auth
        readOnly: true
      - name: codex-home
        mountPath: /home/runner/.codex
      - name: codex-auth-tools
        mountPath: /etc/codex-auth-tools
        readOnly: true
    containers:
    - name: runner
      image: ghcr.io/actions/actions-runner:2.335.1@sha256:08c30b0a7105f64bddfc485d2487a22aa03932a791402393352fdf674bda2c29
      command:
      - /home/runner/run.sh
      env:
      - name: CODEX_HOME
        value: /home/runner/.codex
      - name: USER
        value: runner
      - name: ACTIONS_RUNNER_HOOK_JOB_STARTED
        value: /etc/arc/hooks/job-started.sh
      volumeMounts:
      - name: codex-home
        mountPath: /home/runner/.codex
      - name: runner-hooks
        mountPath: /etc/arc/hooks
        readOnly: true
    volumes:
    - name: codex-home
      emptyDir: {}
    - name: codex-auth
      persistentVolumeClaim:
        claimName: codex-auth
    - name: codex-auth-tools
      configMap:
        name: codex-auth-tools
        defaultMode: 365
    - name: runner-hooks
      configMap:
        name: codex-runner-hooks
        defaultMode: 493
        items:
        - key: job-started.sh
          path: job-started.sh
        - key: install-runner-prerequisites.sh
          path: job-started.d/10-install-runner-prerequisites.sh
