---
apiVersion: batch/v1
kind: CronJob

metadata:
  name: ezshare-sync

spec:
  schedule: 0 * * * *
  suspend: false
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          automountServiceAccountToken: false
          nodeSelector:
            feature.node.kubernetes.io/usb-ff_148f_7601.present: 'true'
          containers:
          - name: sync
            image: debian:stable-slim@sha256:328d16499860ae6cb9b345e2e4cebca08c2a36e4f7278482c7bd1f39d71e5bfd
            imagePullPolicy: IfNotPresent
            command:
            - /scripts/run
            env:
            - name: EZSHARE_URL
              value: http://192.168.4.1
            - name: SYNC_TARGET
              value: /mirror/card
            volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
            - name: data
              mountPath: /mirror
            - name: tmp
              mountPath: /tmp
          volumes:
          - name: script
            configMap:
              name: run-script
              defaultMode: 0755
          - name: data
            persistentVolumeClaim:
              claimName: data
          - name: tmp
            emptyDir: {}
          restartPolicy: Never
