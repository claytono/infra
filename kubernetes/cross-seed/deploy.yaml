---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: cross-seed
  annotations:
    reloader.stakater.com/auto: 'true'
    secret.reloader.stakater.com/reload: cross-seed-secrets

spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: cross-seed
  template:
    metadata:
      labels:
        app: cross-seed
    spec:
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
      initContainers:
      - name: cleanup
        image: ghcr.io/cross-seed/cross-seed:6.13.6@sha256:e2bf5b593e4e7d699e6242423ad7966190cd52ba8eefafdfdbb0cb5b0b609b96
        restartPolicy: Always
        command: [node, /script/cleanup.js]
        env:
        - name: QBITTORRENT_URL
          valueFrom:
            secretKeyRef:
              name: cross-seed-secrets
              key: qbittorrent-url
        - name: MIN_AGE_HOURS
          value: "2"
        - name: SLEEP_SECONDS
          value: "3600"
        - name: CLEANUP_APPLY
          value: "true"
        - name: CROSS_SEEDS_DIR
          value: /config/cross-seeds
        - name: CROSS_SEED_CONFIG
          value: /config/config.js
        - name: TZ
          value: EST5EDT
        volumeMounts:
        - name: config-file
          mountPath: /config/config.js
          subPath: config.js
          readOnly: true
        - name: config
          mountPath: /config
        - name: cleanup-script
          mountPath: /script
          readOnly: true
      containers:
      - name: cross-seed
        image: ghcr.io/cross-seed/cross-seed:6.13.6@sha256:e2bf5b593e4e7d699e6242423ad7966190cd52ba8eefafdfdbb0cb5b0b609b96
        command: [cross-seed, daemon]
        ports:
        - containerPort: 2468
        volumeMounts:
        - name: config-file
          mountPath: /config/config.js
          subPath: config.js
          readOnly: true
        - name: config
          mountPath: /config
        - name: torrents
          mountPath: /torrents
          subPath: qBittorrent/BT_backup
          readOnly: true
        - name: downloads
          mountPath: /downloads
        env:
        - name: TZ
          value: EST5EDT
        - name: PROWLARR_API_KEY
          valueFrom:
            secretKeyRef:
              name: cross-seed-secrets
              key: prowlarr-api-key
        - name: QBITTORRENT_URL
          valueFrom:
            secretKeyRef:
              name: cross-seed-secrets
              key: qbittorrent-url
        - name: SONARR_API_KEY
          valueFrom:
            secretKeyRef:
              name: cross-seed-secrets
              key: sonarr-api-key
        - name: RADARR_API_KEY
          valueFrom:
            secretKeyRef:
              name: cross-seed-secrets
              key: radarr-api-key
      volumes:
      - name: config-file
        configMap:
          name: cross-seed-config
      - name: config
        persistentVolumeClaim:
          claimName: cross-seed-config
      - name: torrents
        persistentVolumeClaim:
          claimName: qbittorrent-config
      - name: downloads
        nfs:
          server: fs2.oneill.net
          path: /volume2/shared/downloads
      - name: cleanup-script
        configMap:
          name: cross-seed-cleanup-script
          defaultMode: 0755
