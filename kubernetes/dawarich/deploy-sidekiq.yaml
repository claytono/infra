---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: dawarich-sidekiq
  namespace: dawarich

spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: dawarich
      app.kubernetes.io/component: sidekiq
  template:
    metadata:
      annotations:
        reloader.stakater.com/auto: 'true'
      labels:
        app.kubernetes.io/name: dawarich
        app.kubernetes.io/component: sidekiq
    spec:
      containers:
      - name: sidekiq
        image: freikin/dawarich:1.7.9@sha256:54329b050caab65f39367308ef7a9f2f3bd1fa3b6ba969d6a33bbf4a0f5e7e84
        command: [bundle, exec, sidekiq]
        args: []
        env:
        - name: RAILS_ENV
          value: production
        - name: DOMAIN
          value: dawarich.k.oneill.net
        - name: SMTP_SERVER
          value: smtp.k.oneill.net
        - name: SMTP_PORT
          value: "587"
        - name: SMTP_DOMAIN
          value: oneill.net
        - name: SMTP_USERNAME
          value: relay@oneill.net
        - name: SMTP_FROM
          value: dawarich@oneill.net
        - name: SMTP_AUTHENTICATION
          value: plain
        - name: SMTP_STARTTLS
          value: "true"
        # Secret environment variables
        - name: SECRET_KEY_BASE
          valueFrom:
            secretKeyRef:
              name: dawarich-secrets
              key: SECRET_KEY_BASE
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: dawarich-smtp
              key: SMTP_PASSWORD
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: dawarich-jwt-secrets
              key: JWT_SECRET_KEY
        # Database credentials from CNPG
        - name: DATABASE_HOST
          value: dawarich-postgres-rw
        - name: DATABASE_PORT
          value: '5432'
        - name: DATABASE_NAME
          valueFrom:
            secretKeyRef:
              name: dawarich-postgres-app
              key: dbname
        - name: DATABASE_USERNAME
          valueFrom:
            secretKeyRef:
              name: dawarich-postgres-app
              key: username
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: dawarich-postgres-app
              key: password
        # Valkey connection
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: dawarich-valkey-config
              key: REDIS_URL
        volumeMounts:
        - name: public
          mountPath: /var/app/public
        - name: watched
          mountPath: /var/app/tmp/imports/watched
        - name: storage
          mountPath: /var/app/storage
      volumes:
      - name: public
        persistentVolumeClaim:
          claimName: dawarich-public
      - name: watched
        persistentVolumeClaim:
          claimName: dawarich-watched
      - name: storage
        persistentVolumeClaim:
          claimName: dawarich-storage
