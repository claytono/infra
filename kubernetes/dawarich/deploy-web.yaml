---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: dawarich-web
  namespace: dawarich

spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: dawarich
      app.kubernetes.io/component: web
  template:
    metadata:
      annotations:
        reloader.stakater.com/auto: 'true'
      labels:
        app.kubernetes.io/name: dawarich
        app.kubernetes.io/component: web
    spec:
      containers:
      - name: web
        image: freikin/dawarich:1.2.0@sha256:e18c28b2f6e0dd973b6ad8c12121c3f3be71c2113928569d409774dd89fc4d07
        command: [web-entrypoint.sh]
        args: [bin/rails, server, -p, '3000', -b, '::']
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        env:
        # Non-default configuration
        - name: APPLICATION_HOSTS
          value: dawarich.k.oneill.net
        - name: TIME_ZONE
          value: America/New_York
        - name: DISTANCE_UNIT
          value: mi
        - name: RAILS_ENV
          value: production
        - name: PHOTON_API_HOST
          value: photon.komoot.io
        # Secret environment variables
        - name: SECRET_KEY_BASE
          valueFrom:
            secretKeyRef:
              name: dawarich-secrets
              key: SECRET_KEY_BASE
        # Database credentials from CNPG
        - name: DATABASE_HOST
          value: dawarich-postgres-rw
        - name: DATABASE_PORT
          value: '5432'
        - name: DATABASE_NAME
          valueFrom:
            secretKeyRef:
              name: dawarich-postgres-app
              key: dbname
        - name: DATABASE_USERNAME
          valueFrom:
            secretKeyRef:
              name: dawarich-postgres-app
              key: username
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: dawarich-postgres-app
              key: password
        # Valkey connection
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: dawarich-valkey-config
              key: REDIS_URL
        # OIDC configuration for Authentik
        - name: OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: dawarich-oidc
              key: OIDC_CLIENT_ID
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: dawarich-oidc
              key: OIDC_CLIENT_SECRET
        - name: OIDC_ISSUER
          value: https://auth.k.oneill.net/application/o/dawarich/
        - name: OIDC_REDIRECT_URI
          value: https://dawarich.k.oneill.net/users/auth/openid_connect/callback
        - name: OIDC_PROVIDER_NAME
          value: Authentik
        volumeMounts:
        - name: public
          mountPath: /var/app/public
        - name: watched
          mountPath: /var/app/tmp/imports/watched
        - name: storage
          mountPath: /var/app/storage
      volumes:
      - name: public
        persistentVolumeClaim:
          claimName: dawarich-public
      - name: watched
        persistentVolumeClaim:
          claimName: dawarich-watched
      - name: storage
        persistentVolumeClaim:
          claimName: dawarich-storage
