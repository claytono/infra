---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: decluttarr-radarr

spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: decluttarr
      app.kubernetes.io/instance: decluttarr-radarr
  template:
    metadata:
      name: decluttarr-radarr
      labels:
        app.kubernetes.io/name: decluttarr
        app.kubernetes.io/instance: decluttarr-radarr
      annotations:
        reloader.stakater.com/auto: 'true'
    spec:
      automountServiceAccountToken: false
      containers:
      - name: decluttarr
        image: ghcr.io/manimatter/decluttarr:v2.1.0@sha256:c06d48426b612b845f2406c2d045f266468a6390faf87aea796d497a2935ec95
        env:
        - name: TZ
          value: America/New_York
        envFrom:
        - secretRef:
            name: decluttarr
        volumeMounts:
        - name: config
          mountPath: /app/config/config.yaml
          subPath: config-radarr.yaml
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: decluttarr-config
