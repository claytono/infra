---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: decluttarr

resources:
- namespace.yaml
- deployment-sonarr.yaml
- deployment-radarr.yaml
- externalsecret.yaml

commonAnnotations:
  argoManaged: 'true'

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
- name: decluttarr-config
  files:
  - config-sonarr.yaml
  - config-radarr.yaml

labels:

- pairs:
    app.kubernetes.io/name: decluttarr
  includeSelectors: false
