---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: frank
  annotations:
    reloader.stakater.com/auto: 'true'

spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: frank
      app.kubernetes.io/instance: frank
  template:
    metadata:
      name: frank
      labels:
        app.kubernetes.io/name: frank
        app.kubernetes.io/instance: frank
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
      - name: syncthing
        image: syncthing/syncthing:2.0.14@sha256:6d2ab058383b533e045cf2c32fc4c6bbe87c612c92bc2aca9f552fb099b2e123
        restartPolicy: Always
        env:
        - name: STNODEFAULTFOLDER
          value: 'true'
        ports:
        - containerPort: 22000
          name: sync
          protocol: TCP
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: data
          mountPath: /var/syncthing/sync/frank
        - name: syncthing-config
          mountPath: /var/syncthing/config
      - name: www
        image: nginxinc/nginx-unprivileged:1.29-alpine@sha256:07ac04b4a727a38e7360f3bd8bbe49a7433a8e2a3259dd403d2c982e5f4c7a1c
        restartPolicy: Always
        ports:
        - containerPort: 8080
          name: www
          protocol: TCP
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: data
          mountPath: /usr/share/nginx/html
          subPath: workspace/www
          readOnly: true
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
          readOnly: true
        - name: nginx-tmp
          mountPath: /tmp
        - name: nginx-cache
          mountPath: /var/cache/nginx
      - name: api
        image: oven/bun:1.3.9-alpine@sha256:9028ee7a60a04777190f0c3129ce49c73384d3fc918f3e5c75f5af188e431981
        restartPolicy: Always
        command: [/bin/sh, /etc/api/api-entrypoint.sh]
        ports:
        - containerPort: 3001
          name: api
          protocol: TCP
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: frank-db-app
              key: uri
        - name: PORT
          value: '3001'
        - name: BUN_INSTALL_CACHE_DIR
          value: /tmp
        - name: BUN_RUNTIME_TRANSPILER_CACHE_PATH
          value: /tmp/bun-cache
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: data
          mountPath: /home/node/.openclaw
          readOnly: false
        - name: api-tmp
          mountPath: /tmp
        - name: api-entrypoint
          mountPath: /etc/api
          readOnly: true
      containers:
      - name: frank
        image: ghcr.io/openclaw/openclaw:2026.2.23@sha256:6346f1c619147790cae8df965f770855b3fa175c319080910bcbf7235a84a5d0
        command:
        - node
        - dist/index.js
        - gateway
        ports:
        - name: gateway
          containerPort: 18789
        env:
        - name: HOME
          value: /home/node
        - name: TERM
          value: xterm-256color
        - name: NPM_CONFIG_CACHE
          value: /home/node/.openclaw/.npm
        envFrom:
        - secretRef:
            name: frank-secrets
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: config
          mountPath: /home/node/.openclaw/openclaw.json
          subPath: openclaw.json
          readOnly: true
        - name: data
          mountPath: /home/node/.openclaw
        - name: tmp
          mountPath: /tmp
      - name: browser
        image: zenika/alpine-chrome:latest@sha256:54a0e0cbe20d30f6f36485ff23a22985022cddaf6172789f82ae2d7457daa63a
        args:
        - --no-sandbox
        - --disable-gpu
        - --disable-dev-shm-usage
        - --disable-blink-features=AutomationControlled
        - --window-size=1920,1080
        - --remote-debugging-address=0.0.0.0
        - --remote-debugging-port=9222
        - --headless=new
        ports:
        - name: cdp
          containerPort: 9222
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: browser-tmp
          mountPath: /tmp
        - name: browser-home
          mountPath: /home/chrome
      volumes:
      - name: config
        configMap:
          name: frank-config
      - name: data
        persistentVolumeClaim:
          claimName: frank-data
      - name: tmp
        emptyDir:
          sizeLimit: 10Gi
      - name: browser-tmp
        emptyDir:
          sizeLimit: 1Gi
      - name: browser-home
        emptyDir:
          sizeLimit: 1Gi
      - name: syncthing-config
        persistentVolumeClaim:
          claimName: frank-syncthing-config
      - name: nginx-config
        configMap:
          name: frank-nginx-config
      - name: nginx-tmp
        emptyDir:
          sizeLimit: 64Mi
      - name: nginx-cache
        emptyDir:
          sizeLimit: 64Mi
      - name: api-entrypoint
        configMap:
          name: frank-api-entrypoint
      - name: api-tmp
        emptyDir:
          sizeLimit: 64Mi
