---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: frank
  annotations:
    reloader.stakater.com/auto: 'true'

spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: frank
      app.kubernetes.io/instance: frank
  template:
    metadata:
      name: frank
      labels:
        app.kubernetes.io/name: frank
        app.kubernetes.io/instance: frank
    spec:
      serviceAccountName: frank
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
      - name: syncthing
        image: syncthing/syncthing:2.0.16@sha256:4a961394ca471f4e48f31ad2cef50697e502c8799e2e98477a1c3844e0c5bc54
        restartPolicy: Always
        env:
        - name: STNODEFAULTFOLDER
          value: 'true'
        ports:
        - containerPort: 22000
          name: sync
          protocol: TCP
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: data
          mountPath: /var/syncthing/sync/frank
        - name: syncthing-config
          mountPath: /var/syncthing/config
      - name: www
        image: nginxinc/nginx-unprivileged:1.29-alpine@sha256:0c79d56aee561a1d81c63f00eee5fb5fe29279560cdc55e91425133104c7fbe6
        restartPolicy: Always
        ports:
        - containerPort: 8080
          name: www
          protocol: TCP
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: data
          mountPath: /usr/share/nginx/html
          subPath: workspace/www
          readOnly: true
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
          readOnly: true
        - name: nginx-tmp
          mountPath: /tmp
        - name: nginx-cache
          mountPath: /var/cache/nginx
      - name: api
        image: oven/bun:1.3.14-alpine@sha256:5acc90a93e91ff07bf72aa90a7c9f0fa189765aec90b47bdbf2152d2196383c0
        restartPolicy: Always
        command: [/bin/sh, /etc/api/api-entrypoint.sh]
        ports:
        - containerPort: 3001
          name: api
          protocol: TCP
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: frank-db-app
              key: uri
        - name: PORT
          value: '3001'
        - name: BUN_INSTALL_CACHE_DIR
          value: /tmp
        - name: BUN_RUNTIME_TRANSPILER_CACHE_PATH
          value: /tmp/bun-cache
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: data
          mountPath: /home/node/.openclaw
          readOnly: false
        - name: api-tmp
          mountPath: /tmp
        - name: api-entrypoint
          mountPath: /etc/api
          readOnly: true
      containers:
      - name: frank
        image: ghcr.io/openclaw/openclaw:2026.5.7@sha256:1af3f457a2d5a1d210f4d95634fa5da6e23f9c0ac7b52ef4bc38e2ecf09704fd
        command:
        - node
        - dist/index.js
        - gateway
        ports:
        - name: gateway
          containerPort: 18789
        env:
        - name: HOME
          value: /home/node
        - name: TERM
          value: xterm-256color
        - name: NPM_CONFIG_CACHE
          value: /home/node/.openclaw/.npm
        envFrom:
        - secretRef:
            name: frank-secrets
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: config
          mountPath: /home/node/.openclaw/openclaw.json
          subPath: openclaw.json
          readOnly: true
        - name: data
          mountPath: /home/node/.openclaw
        - name: tmp
          mountPath: /tmp
        - name: kube-api-access
          mountPath: /var/run/secrets/kubernetes.io/serviceaccount
          readOnly: true
      - name: browser
        image: zenika/alpine-chrome:latest@sha256:b7421e26b9cd26b44d4e3d1c791e34ab25a088ceb692ea620d803c759ffb618c
        args:
        - --no-sandbox
        - --disable-gpu
        - --disable-dev-shm-usage
        - --disable-blink-features=AutomationControlled
        - --window-size=1920,1080
        - --remote-debugging-address=0.0.0.0
        - --remote-debugging-port=9222
        - --headless=new
        ports:
        - name: cdp
          containerPort: 9222
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: browser-tmp
          mountPath: /tmp
        - name: browser-home
          mountPath: /home/chrome
      volumes:
      - name: kube-api-access
        projected:
          defaultMode: 0444
          sources:
          - serviceAccountToken:
              expirationSeconds: 3600
              path: token
          - configMap:
              name: kube-root-ca.crt
              items:
              - key: ca.crt
                path: ca.crt
          - downwardAPI:
              items:
              - fieldRef:
                  fieldPath: metadata.namespace
                path: namespace
      - name: config
        configMap:
          name: frank-config
      - name: data
        persistentVolumeClaim:
          claimName: frank-data
      - name: tmp
        emptyDir:
          sizeLimit: 10Gi
      - name: browser-tmp
        emptyDir:
          sizeLimit: 1Gi
      - name: browser-home
        emptyDir:
          sizeLimit: 1Gi
      - name: syncthing-config
        persistentVolumeClaim:
          claimName: frank-syncthing-config
      - name: nginx-config
        configMap:
          name: frank-nginx-config
      - name: nginx-tmp
        emptyDir:
          sizeLimit: 64Mi
      - name: nginx-cache
        emptyDir:
          sizeLimit: 64Mi
      - name: api-entrypoint
        configMap:
          name: frank-api-entrypoint
      - name: api-tmp
        emptyDir:
          sizeLimit: 64Mi
