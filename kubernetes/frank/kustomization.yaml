---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: frank

components:
- ../components/authentik

resources:
- namespace.yaml
- deployment.yaml
- service.yaml
- service-syncthing.yaml
- service-syncthing-gui.yaml
- service-www.yaml
- ingress.yaml
- ingress-ui.yaml
- ingress-www.yaml
- ingress-syncthing.yaml
- externalsecret.yaml
- pvc.yaml
- pvc-syncthing.yaml

configMapGenerator:
- name: frank-config
  files:
  - openclaw.json
- name: frank-nginx-config
  files:
  - nginx.conf

generatorOptions:
  disableNameSuffixHash: true

commonAnnotations:
  argoManaged: 'true'

labels:

- pairs:
    app.kubernetes.io/name: frank
    app.kubernetes.io/instance: frank
  includeSelectors: true
