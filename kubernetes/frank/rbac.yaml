---
apiVersion: v1
kind: ServiceAccount

metadata:
  name: frank

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role

metadata:
  name: frank-readonly

rules:
- apiGroups: ['']
  resources: [pods, pods/log, services, configmaps, events, endpoints]
  verbs: [get, list, watch]
- apiGroups: [events.k8s.io]
  resources: [events]
  verbs: [get, list, watch]
- apiGroups: [apps]
  resources: [deployments, replicasets, statefulsets]
  verbs: [get, list, watch]
- apiGroups: [batch]
  resources: [jobs, cronjobs]
  verbs: [get, list, watch]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding

metadata:
  name: frank-readonly

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: frank-readonly

subjects:
- kind: ServiceAccount
  name: frank
