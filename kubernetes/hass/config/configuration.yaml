    entity_id: binary_sensor.main_floor_bathroom_leak_water_leak
    state: 'on'
    repeat: 10
    notifiers:
    - call_me
  basement_bathroom_water:
    name: Water is detected in the basement bathroom!
    entity_id: binary_sensor.basement_bathroom_leak_water_leak
    state: 'on'
    repeat: 10
    notifiers:
    - call_me
  kids_bathroom_water:
    name: Water is detected in the kids bathroom!
    entity_id: binary_sensor.kids_bathroom_leak_water_leak
    state: 'on'
    repeat: 10
    notifiers:
    - call_me
  master_bathroom_water:
    name: Water is detected in the master bathroom!
    entity_id: binary_sensor.master_bathroom_leak_water_leak
    state: 'on'
    repeat: 10
    notifiers:
    - call_me
  freezer_sensor_offline:
    name: Freezer sensor is offline
    entity_id: binary_sensor.freezer_sensor_status
    state: 'off'
    repeat: 10
    skip_first: true
    notifiers:
    - call_me
  freezer_door_open:
    name: Freezer Door Left Open
    done_message: Freezer door is now closed.
    entity_id: binary_sensor.freezer_door_open_too_long
    state: 'on'
    repeat: 10
    notifiers:
    - clayton
    - call_me
  freezer_door_sensor_offline:
    name: Freezer sensor is offline
    entity_id: binary_sensor.freezer_door_sensor_status
    state: 'off'
    repeat: 10
    skip_first: true
    notifiers:
    - clayton
    - call_me

