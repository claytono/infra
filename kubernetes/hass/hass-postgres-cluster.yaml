---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster

metadata:
  name: hass-postgres

spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:17.9-standard-trixie@sha256:4b4382d5496ae319f0a71aa0d8237c3219d302931a543da1909320658cdb09a5
  enablePDB: true

  storage:
    size: 10Gi

  bootstrap:
    initdb:
      database: hass
      owner: hass
      encoding: UTF8
