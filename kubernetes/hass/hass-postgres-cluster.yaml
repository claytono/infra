---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster

metadata:
  name: hass-postgres

spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4-standard-trixie@sha256:58c9a9e29a23b814f8f335ce178727d83bc40d96ed7fe8977192d2d8cdcb3927
  enablePDB: true

  storage:
    size: 10Gi

  bootstrap:
    initdb:
      database: hass
      owner: hass
      encoding: UTF8
