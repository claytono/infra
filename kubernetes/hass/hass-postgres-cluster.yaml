---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster

metadata:
  name: hass-postgres

spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-standard-trixie@sha256:9f9f53c9e07e5b2924945e6eaeb9168f7e856786d221839866ac85ccd703b3ba
  enablePDB: true

  storage:
    size: 10Gi

  bootstrap:
    initdb:
      database: hass
      owner: hass
      encoding: UTF8
