---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster

metadata:
  name: hass-postgres

spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4-standard-trixie@sha256:802cb43a4d482acf1037b418e421c865b16959ba22e07f16fc003e06cb21084c
  enablePDB: true

  storage:
    size: 10Gi

  bootstrap:
    initdb:
      database: hass
      owner: hass
      encoding: UTF8
