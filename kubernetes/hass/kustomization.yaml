---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hass

resources:
- namespace.yaml
- hass-postgres-cluster.yaml
- hass-externalsecrets.yaml
- helm/serviceaccount.yaml
- helm/service.yaml
- helm/statefulset.yaml
- helm/ingress.yaml
- config

images:
- name: ghcr.io/home-assistant/home-assistant
  newName: homeassistant/home-assistant
  newTag: 2026.5.4@sha256:ceb1202133a5a036e8b03e20a10eb113186cc2f871968323c6fc6c3fc4205716

labels:

- pairs:
    app.kubernetes.io/name: hass
    app.kubernetes.io/instance: hass
  includeSelectors: true
