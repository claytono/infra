---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster

metadata:
  name: homebox-postgres

spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-standard-trixie@sha256:d879dfab951cb0eef9beac367f259d08ea1c04ae84699526854ff9ae478656be
  enablePDB: false

  storage:
    size: 10Gi

  bootstrap:
    initdb:
      database: homebox
      owner: homebox
