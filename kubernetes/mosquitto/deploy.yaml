---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: mosquitto
  annotations:
    reloader.stakater.com/auto: 'true'

spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: mosquitto
      app.kubernetes.io/instance: mosquitto
  replicas: 1
  strategy:
    type: Recreate
  template:
    spec:
      initContainers:
      - name: init-password-file
        image: alpine:3.23@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
        command: [/bin/sh, -c, /scripts/create-password-file > /generated/passwd]
        volumeMounts:
        - name: script
          mountPath: /scripts
          readOnly: true
        - name: users
          mountPath: /users
          readOnly: true
        - name: generated
          mountPath: /generated
      containers:
      - name: mosquitto
        image: eclipse-mosquitto:2.0@sha256:914f529386804c8278a4e581526b9be5e1604df44b30daabc70aa97dcefe5268
        imagePullPolicy: Always
        resources:
          limits:
            cpu: '0.5'
            memory: 500Mi
        ports:
        - containerPort: 9001
        - containerPort: 1883
        - containerPort: 8883
        - containerPort: 8084
        volumeMounts:
        - name: config
          mountPath: /mosquitto/config
          readOnly: true
        - name: data
          mountPath: /mosquitto/data
        - name: generated
          mountPath: /generated
          readOnly: true
        - name: tls
          mountPath: /mosquitto/certs
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: mosquitto
      - name: passwd
        secret:
          secretName: mosquitto
      - name: users
        secret:
          secretName: mosquitto-users
      - name: data
        persistentVolumeClaim:
          claimName: mosquitto-data
      - name: generated
        emptyDir: {}
      - name: script
        configMap:
          name: create-password-file-script
          defaultMode: 0755
      - name: tls
        secret:
          secretName: mosquitto-tls
