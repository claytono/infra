---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: mqtt-log
  annotations:
    reloader.stakater.com/auto: 'true'

spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: mqtt-log
      app.kubernetes.io/instance: mqtt-log
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mqtt-log
        app.kubernetes.io/instance: mqtt-log
    spec:
      containers:
      - name: mqtt-log
        image: eclipse-mosquitto:2.0@sha256:212f89e1eaeb2c322d6441b64396e3346026674db8fa9c27beac293405c32b3c
        env:
        - name: MQTT_USERNAME
          valueFrom:
            secretKeyRef:
              name: mqtt-log
              key: username
        - name: MQTT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mqtt-log
              key: password
        command: [/usr/bin/mosquitto_sub]
        args: [-h, mosquitto, -t, '#', -v, -u, $(MQTT_USERNAME), -P, $(MQTT_PASSWORD),
          -F, '{"timestamp":"%I","topic":"%t","message":"%p"}']
        imagePullPolicy: Always
