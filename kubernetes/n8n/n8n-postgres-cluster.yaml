---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster

metadata:
  name: n8n-postgres

spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-standard-trixie@sha256:81bad466fe006454482678c6c67a24c1e30454b519011e0196cba2e4c83e1e1a
  enablePDB: false

  storage:
    size: 10Gi

  bootstrap:
    initdb:
      database: n8n
      owner: n8n
