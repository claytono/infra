---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: netdata-k8s-state
  namespace: netdata

spec:
  template:
    spec:
      initContainers:
      - name: inject-stream-key
        image: alpine:3.23@sha256:fd791d74b68913cbb027c6546007b3f0d3bc45125f797758156952bc2d6daf40
        command:
        - sh
        - -c
        - |
          sed "s/11111111-2222-3333-4444-555555555555/$NETDATA_STREAM_API_KEY/g" \
            /etc/netdata-tmpl/stream > /etc/netdata-out/stream.conf
        envFrom:
        - secretRef:
            name: netdata-streaming
        volumeMounts:
        - name: configmap
          mountPath: /etc/netdata-tmpl
        - name: stream-conf
          mountPath: /etc/netdata-out
