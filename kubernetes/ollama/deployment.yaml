---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: ollama
  namespace: ollama
  labels:
    app.kubernetes.io/name: ollama
  annotations:
    reloader.stakater.com/auto: 'true'

spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama
    spec:
      runtimeClassName: nvidia
      priorityClassName: gpu-priority
      containers:
      - name: ollama
        image: ollama/ollama:0.20.2@sha256:0455f166da85b1d07f694c33ba09278ca649603c0611ba8e46272b16eed7fccd
        env:
        - name: OLLAMA_CONTEXT_LENGTH
          value: '8192'
        ports:
        - name: http
          containerPort: 11434
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          limits:
            nvidia.com/gpu: 1
        volumeMounts:
        - name: models
          mountPath: /root/.ollama
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: ollama-models
