---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster

metadata:
  name: openarchiver-postgres
  namespace: openarchiver

spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-standard-trixie@sha256:d879dfab951cb0eef9beac367f259d08ea1c04ae84699526854ff9ae478656be
  enablePDB: false

  storage:
    size: 20Gi

  bootstrap:
    initdb:
      database: openarchiver
      owner: openarchiver
