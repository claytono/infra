---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pinepods

resources:
- namespace.yaml
- postgres-cluster.yaml
- pvc-downloads.yaml
- externalsecret.yaml
  # PinePods
- helm/pinepods/deployment.yaml
- helm/pinepods/ingress.yaml
- helm/pinepods/pvc.yaml
- helm/pinepods/secret.yaml
- helm/pinepods/service.yaml
  # Valkey
- helm/valkey/configmap.yaml
- helm/valkey/headless-svc.yaml
- helm/valkey/health-configmap.yaml
- helm/valkey/scripts-configmap.yaml
- helm/valkey/primary/application.yaml
- helm/valkey/primary/service.yaml
- helm/valkey/primary/serviceaccount.yaml

commonAnnotations:
  argoManaged: 'true'

images:
- name: madeofpendletonwool/pinepods
  newTag: latest@sha256:ebc258bb0c62cdb69e5fb726b247c885dac19b50d06fed68fa8d37197b88ace4
- name: docker.io/bitnami/valkey
  newTag: latest@sha256:1d36cd0d9929e59f6dcf698189152f5ee09339242cfbe18aed01a38b0a5d981f

patches:

- target:
    kind: Deployment
    name: pinepods
  patch: |-
    - op: remove
      path: /spec/template/spec/containers/0/livenessProbe
    - op: remove
      path: /spec/template/spec/containers/0/readinessProbe
    - op: add
      path: /spec/template/spec/containers/0/envFrom/-
      value:
        secretRef:
          name: pinepods-oidc
