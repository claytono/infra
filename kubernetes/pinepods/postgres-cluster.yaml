---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster

metadata:
  name: pinepods-postgres
  namespace: pinepods

spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17.9-standard-trixie@sha256:4b4382d5496ae319f0a71aa0d8237c3219d302931a543da1909320658cdb09a5
  enablePDB: false

  storage:
    size: 5Gi

  bootstrap:
    initdb:
      database: pinepods
      owner: pinepods
