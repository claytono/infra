---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster

metadata:
  name: pinepods-postgres
  namespace: pinepods

spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-standard-trixie@sha256:5e2ff7c276ec292f087279a9a9f7a86f796b552fceb013a75777380500c0aa93
  enablePDB: false

  storage:
    size: 5Gi

  bootstrap:
    initdb:
      database: pinepods
      owner: pinepods
