---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster

metadata:
  name: pinepods-postgres
  namespace: pinepods

spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4-standard-trixie@sha256:1e9b7f86a108b8eb472f52b59fc085aafee4cb3841484727ad67c020a8935a86
  enablePDB: false

  storage:
    size: 5Gi

  bootstrap:
    initdb:
      database: pinepods
      owner: pinepods
