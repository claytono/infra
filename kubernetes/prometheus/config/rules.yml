---
groups:
- name: recording.rules
  rules:
      # Records whether or not distance from bottom of desk to floor is greater
      # than one meter.
  - record: desk_up
    expr: hass_sensor_unit_m{entity="sensor.desk_ultrasonic_sensor"} >  bool 0.9
- name: alert.rules
  rules:
  - alert: NodeDown
    expr: up{job="node resources"} == 0
    for: 5m
  - alert: ICMPUnreachable
    expr: probe_success == 0
    for: 20m
  - alert: ExporterDown
    expr: up{job!="node resources", job!="hwinfo gaming pc", resticprofile!~".+"}
      == 0
    for: 15m
  - alert: AutobrrIRCUnhealthy
    expr: >
      autobrr_irc_enabled_total{app_kubernetes_io_name="autobrr"}
      - autobrr_irc_healthy_total{app_kubernetes_io_name="autobrr"} > 0
    for: 10m
    annotations:
      message: Autobrr has {{ $value }} enabled IRC network(s) unhealthy
  - alert: AutobrrFeedStale
    expr: >
      time() - autobrr_feed_last_run_timestamp_seconds{app_kubernetes_io_name="autobrr"}
      > 21600
    for: 10m
    annotations:
      message: Autobrr feed/indexer {{ $labels.feed }} has not completed successfully
        in more than 6 hours
  - alert: Outdoor_Sensor_Battery_Low
    expr: >
      (hass_sensor_voltage_v{entity=~"sensor.*(soil|rain).*battery.*"} < 1.2)
      or
      ((hass_sensor_voltage_mv{entity=~"sensor.*(soil|rain).*battery.*"} / 1000) <
      1.2)
    for: 1h
    annotations:
      message: '{{ $labels.friendly_name }} is at {{ $value }}V - replace battery'
  - alert: Outdoor_Sensor_Unavailable
    expr: hass_entity_available{entity=~"sensor.*(soil.*moisture|rain_meter).*"} ==
      0
    for: 1d
    annotations:
      message: '{{ $labels.friendly_name }} has stopped reporting'
  - alert: PodStuckNotRunning
    expr: >
      (kube_pod_status_phase{phase!="Running", phase!="Succeeded"} == 1)
      unless on(namespace,pod) kube_pod_owner{owner_kind="Job"}
    for: 15m
    annotations:
      message: Pod {{ $labels.namespace }}/{{ $labels.pod }} has been in {{ $labels.phase }}
        phase for more than 15 minutes
