---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: prometheus
  annotations:
    reloader.stakater.com/auto: 'true'

spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
      app.kubernetes.io/instance: prometheus
  template:
    metadata:
      name: prometheus
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/instance: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
      - name: prometheus
        image: prom/prometheus:v3.11.0@sha256:dda13e28bf95a5e5ca5b8ed56852006094c1c8e8871d9c9dbeed30aa6e55271f
        args:
        - --config.file=/etc/prometheus/prometheus.yml
        - --web.external-url=https://prometheus.k.oneill.net
        - --storage.tsdb.retention.time=730d
        ports:
        - name: web
          containerPort: 9090
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        - name: secrets
          mountPath: /secrets
          readOnly: true
        - name: data
          mountPath: /prometheus/data
      volumes:
      - name: config
        configMap:
          name: prometheus
      - name: secrets
        secret:
          secretName: prometheus
      - name: data
        persistentVolumeClaim:
          claimName: prometheus-data
