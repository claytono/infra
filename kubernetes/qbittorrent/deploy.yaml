---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: qbittorrent
  labels:
    app: qbittorrent
  annotations:
    goldilocks.fairwinds.com/vpa-resource-policy: '{"containerPolicies":[{"containerName":"*","controlledValues":"RequestsOnly","maxAllowed":{"memory":"2Gi"}}]}'
    reloader.stakater.com/auto: 'true'

spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      containers:
      - name: qbittorrent
        # Before upgrading qBittorrent, verify the target version is supported by
        # the qbit_manage image pinned in ../qbit-manage/deploy.yaml.
        image: ghcr.io/linuxserver/qbittorrent:5.2.3@sha256:b024436f8ca665d16d9a997d26fd27fdf867ee5566ba09f32764e7b2976d3e02
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        - containerPort: 51414
        startupProbe:
          exec:
            command:
            - /scripts/check-health.sh
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 60
        readinessProbe:
          exec:
            command:
            - /scripts/check-health.sh
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - mountPath: /config
          name: config
        - mountPath: /downloads
          name: downloads
        - mountPath: /scripts
          name: scripts
          readOnly: true
        env:
        - name: PUID
          value: '10001'
        - name: PGID
          value: '10001'
        - name: TZ
          value: America/New_York
        - name: QBITTORRENT_API_KEY
          valueFrom:
            secretKeyRef:
              name: qbittorrent
              key: api-key
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: qbittorrent-config
      - nfs:
          server: fs2.oneill.net
          path: /volume2/shared/downloads
        name: downloads
      - name: scripts
        configMap:
          name: qbittorrent-scripts
          defaultMode: 0555
