---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: qbittorrent
  labels:
    app: qbittorrent
  annotations:
    goldilocks.fairwinds.com/vpa-resource-policy: '{"containerPolicies":[{"containerName":"*","controlledValues":"RequestsOnly","maxAllowed":{"memory":"2Gi"}}]}'
    reloader.stakater.com/auto: 'true'

spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      terminationGracePeriodSeconds: 1800
      containers:
      - name: qbittorrent
        # Before upgrading qBittorrent, verify the target version is supported by
        # the qbit_manage image pinned in ../qbit-manage/deploy.yaml.
        image: ghcr.io/qbittorrent/docker-qbittorrent-nox:5.2.3-lt2-1@sha256:f269c2aae56f1bf8caddd77a59e7ba2a278919d8401213266b8fe154c6ac1043
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsGroup: 10001
          runAsNonRoot: true
          runAsUser: 10001
        ports:
        - containerPort: 8080
        - containerPort: 51414
        readinessProbe:
          exec:
            command:
            - /scripts/check-health.sh
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - mountPath: /config
          name: config
        - mountPath: /downloads
          name: downloads
        - mountPath: /scripts
          name: scripts
          readOnly: true
        env:
        - name: QBT_LEGAL_NOTICE
          value: confirm
        - name: TZ
          value: America/New_York
        - name: QBITTORRENT_API_KEY
          valueFrom:
            secretKeyRef:
              name: qbittorrent
              key: api-key
        - name: CROSS_SEED_API_KEY
          valueFrom:
            secretKeyRef:
              name: qbittorrent
              key: cross-seed-api-key
      - name: qbittorrent-log
        image: ghcr.io/qbittorrent/docker-qbittorrent-nox:5.2.3-lt2-1@sha256:f269c2aae56f1bf8caddd77a59e7ba2a278919d8401213266b8fe154c6ac1043
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsGroup: 10001
          runAsNonRoot: true
          runAsUser: 10001
        command:
        - /sbin/tini
        - -g
        - --
        - tail
        args:
        - -n
        - "0"
        - -F
        - /config/qBittorrent/logs/qbittorrent.log
        volumeMounts:
        - mountPath: /config
          name: config
          readOnly: true
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: qbittorrent-config
      - nfs:
          server: fs2.oneill.net
          path: /volume2/shared/downloads
        name: downloads
      - name: scripts
        configMap:
          name: qbittorrent-scripts
          defaultMode: 0555
