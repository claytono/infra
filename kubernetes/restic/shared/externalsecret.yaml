---
apiVersion: external-secrets.io/v1
kind: ExternalSecret

metadata:
  name: resticprofile
  labels:
    app.kubernetes.io/instance: restic
    app.kubernetes.io/name: resticprofile
    app.kubernetes.io/component: secrets

spec:
  secretStoreRef:
    name: production
    kind: ClusterSecretStore
  data:
  - secretKey: RESTIC_PASSWORD
    remoteRef:
      key: resticprofile
      property: RESTIC_PASSWORD
  - secretKey: RESTIC_TEMPLATE_PASSWORD
    remoteRef:
      key: restic-rest-server
      property: template-v1-password
  - secretKey: HEALTHCHECK_PING_KEY
    remoteRef:
      key: healthchecks
      property: PING_KEY
  - secretKey: HEALTHCHECK_API_KEY
    remoteRef:
      key: healthchecks
      property: API_KEY

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret

metadata:
  name: resticprofile-rclone-hetzner-main
  labels:
    app.kubernetes.io/instance: restic
    app.kubernetes.io/name: resticprofile
    app.kubernetes.io/component: secrets

spec:
  secretStoreRef:
    name: production
    kind: ClusterSecretStore
  data:
  # URL and username come from the tofu-managed login item.
  - secretKey: RCLONE_CONFIG_HETZNER_WEBDAV_RESTIC_MAIN_URL
    remoteRef:
      key: hetzner-restic-main
      property: url
  - secretKey: RCLONE_CONFIG_HETZNER_WEBDAV_RESTIC_MAIN_USER
    remoteRef:
      key: hetzner-restic-main
      property: username
  # WebDAV `pass` must already be `rclone obscure` output, not the raw login
  # password. Read it from the manual `hetzner-restic-rclone` secure note.
  - secretKey: RCLONE_CONFIG_HETZNER_WEBDAV_RESTIC_MAIN_PASS
    remoteRef:
      key: hetzner-restic-rclone
      property: RCLONE_CONFIG_HETZNER_WEBDAV_RESTIC_MAIN_PASS
  - secretKey: RCLONE_CONFIG_HETZNER_CRYPT_RESTIC_MAIN_PASSWORD
    remoteRef:
      key: hetzner-restic-main
      property: RCLONE_CONFIG_HETZNER_RESTIC_PASSWORD
  - secretKey: RCLONE_CONFIG_HETZNER_CRYPT_RESTIC_MAIN_PASSWORD2
    remoteRef:
      key: hetzner-restic-main
      property: RCLONE_CONFIG_HETZNER_RESTIC_PASSWORD2

