---
apiVersion: v1
kind: Namespace

metadata:
  name: restic
  labels:
    app.kubernetes.io/instance: restic
    app.kubernetes.io/name: restic
    app.kubernetes.io/component: namespace
    goldilocks.fairwinds.com/enabled: 'true'
  annotations:
    goldilocks.fairwinds.com/vpa-update-mode: InPlaceOrRecreate
    goldilocks.fairwinds.com/vpa-resource-policy: '{"containerPolicies":[{"containerName":"*","controlledValues":"RequestsOnly","maxAllowed":{"memory":"2Gi"}}]}'
