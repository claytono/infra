---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: seerr
  annotations:
    reloader.stakater.com/auto: 'true'

spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: seerr
      app.kubernetes.io/name: seerr
      app.kubernetes.io/instance: seerr
  template:
    metadata:
      labels:
        app: seerr
        app.kubernetes.io/name: seerr
        app.kubernetes.io/instance: seerr
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: seerr
        image: ghcr.io/seerr-team/seerr:v3.3.0@sha256:c92d2dc117f62185e7bcb88cd56efd374ea79210eaf433275449e8d5988eb5a8
        ports:
        - containerPort: 5055
        volumeMounts:
        - mountPath: /app/config
          name: config
        env:
        - name: TZ
          value: EST5EDT
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: seerr-config
