apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: seerr

commonAnnotations:
  argoManaged: 'true'

resources:
- namespace.yaml
- deploy.yaml
- service.yaml
- ingress.yaml
- pvc-config.yaml

labels:

- pairs:
    app.kubernetes.io/name: seerr
    app.kubernetes.io/instance: seerr
  includeSelectors: true
