---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster

metadata:
  name: semaphore-postgres

spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-standard-trixie@sha256:25cfdd49e4a2b98e497e59e0520d9ef208b54588889fa70098685e97f11d97d5
  enablePDB: true

  storage:
    size: 10Gi

  bootstrap:
    initdb:
      database: semaphore
      owner: semaphore
