---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: shelfmark
  annotations:
    reloader.stakater.com/auto: 'true'

spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: shelfmark
  template:
    metadata:
      labels:
        app: shelfmark
    spec:
      containers:
      - name: shelfmark
        image: ghcr.io/calibrain/shelfmark:v1.3.1@sha256:80c8d561ae6ff9407d51f37266cd2ab44a38bf4df17834e42fde01982eefe6af
        ports:
        - containerPort: 8084
          name: http
        env:
        - name: PUID
          value: '10001'
        - name: PGID
          value: '10001'
        - name: TZ
          value: EST5EDT
        - name: AUTH_METHOD
          value: oidc
        - name: OIDC_DISCOVERY_URL
          value: https://auth.k.oneill.net/application/o/shelfmark/.well-known/openid-configuration
        - name: OIDC_AUTO_REDIRECT
          value: 'true'
        - name: OIDC_AUTO_PROVISION
          value: 'true'
        - name: OIDC_ADMIN_GROUP
          value: authentik Admins
        - name: OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: shelfmark-oidc
              key: OIDC_CLIENT_ID
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: shelfmark-oidc
              key: OIDC_CLIENT_SECRET
        volumeMounts:
        - mountPath: /config
          name: config
        - mountPath: /books
          name: grimmory-ingest
        - mountPath: /downloads
          name: downloads
        - mountPath: /audiobooks
          name: audiobooks
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: shelfmark-config
      - name: grimmory-ingest
        nfs:
          server: fs2.oneill.net
          path: /volume2/shared/downloads/grimmory-ingestion
      - name: downloads
        nfs:
          server: fs2.oneill.net
          path: /volume2/shared/downloads
      - name: audiobooks
        nfs:
          server: fs2.oneill.net
          path: /volume2/shared/books/audiobookshelf
