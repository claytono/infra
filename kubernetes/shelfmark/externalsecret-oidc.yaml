---
apiVersion: external-secrets.io/v1
kind: ExternalSecret

metadata:
  name: shelfmark-oidc
  namespace: shelfmark

spec:
  secretStoreRef:
    name: production
    kind: ClusterSecretStore
  data:
  - secretKey: OIDC_CLIENT_ID
    remoteRef:
      key: shelfmark-oidc
      property: client-id
  - secretKey: OIDC_CLIENT_SECRET
    remoteRef:
      key: shelfmark-oidc
      property: client-secret
  target:
    name: shelfmark-oidc
