---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: sonarr
  annotations:
    reloader.stakater.com/auto: 'true'

spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: sonarr
  template:
    metadata:
      labels:
        app: sonarr
    spec:
      containers:
      - name: sonarr
        image: linuxserver/sonarr:4.0.17@sha256:60f3b6b5c7647ba2bafd81163acfe34b11117b9b834ebd7fbcc3e5f1b309c7ef
        ports:
        - containerPort: 8989
        volumeMounts:
        - mountPath: /config
          name: config
        - mountPath: /shared
          name: shared
        env:
        - name: PUID
          value: '10001'
        - name: PGID
          value: '10001'
        - name: TZ
          value: EST5EDT
        lifecycle:
          postStart:
            exec:
              command:
              - /bin/sh
              - -c
              - apk add ffmpeg
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: sonarr-config
      - nfs:
          server: fs2.oneill.net
          path: /volume2/shared
        name: shared
