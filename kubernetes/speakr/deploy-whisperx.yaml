---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: whisperx
  namespace: speakr
  labels:
    app.kubernetes.io/name: speakr
    app.kubernetes.io/component: whisperx
  annotations:
    reloader.stakater.com/auto: 'true'

spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: speakr
      app.kubernetes.io/component: whisperx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: speakr
        app.kubernetes.io/component: whisperx
    spec:
      runtimeClassName: nvidia
      priorityClassName: gpu-priority
      containers:
      - name: whisperx
        image: learnedmachine/whisperx-asr-service:0.3.2@sha256:ca4e0e0d437697c6892a4fdd43ae26fe5aefb35ddd370e798747b1ab53fd31de
        ports:
        - name: http
          containerPort: 9000
          protocol: TCP
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: speakr-secrets
              key: HF_TOKEN
        - name: DEVICE
          value: cuda
        - name: COMPUTE_TYPE
          value: int8
        - name: BATCH_SIZE
          value: '4'
        # Model cache directories
        - name: HF_HOME
          value: /cache/huggingface
        - name: TORCH_HOME
          value: /cache/torch
        - name: XDG_CACHE_HOME
          value: /cache
        resources:
          limits:
            nvidia.com/gpu: 1
        volumeMounts:
        - name: cache
          mountPath: /cache
        - name: cache
          mountPath: /.cache
      volumes:
      - name: cache
        persistentVolumeClaim:
          claimName: whisperx-cache
