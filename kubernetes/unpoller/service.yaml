---
apiVersion: v1
kind: Service

metadata:
  name: unpoller
  labels:
    app.kubernetes.io/name: unpoller
    app.kubernetes.io/instance: unpoller
  annotations:
    prometheus.io/scrape: 'true'

spec:
  selector:
    app.kubernetes.io/name: unpoller
    app.kubernetes.io/instance: unpoller
  ports:
  - name: unpoller
    protocol: TCP
    port: 9130
    targetPort: 9130
