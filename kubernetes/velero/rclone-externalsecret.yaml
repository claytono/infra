---
apiVersion: external-secrets.io/v1
kind: ExternalSecret

metadata:
  name: velero-encrypt
  namespace: velero

spec:
  refreshInterval: 24h
  secretStoreRef:
    name: production
    kind: ClusterSecretStore
  target:
    name: velero-encrypt
    creationPolicy: Owner
    template:
      data:
        hetzner_url: '{{ .hetzner_url }}'
        hetzner_user: '{{ .hetzner_user }}'
        hetzner_pass: '{{ .hetzner_pass }}'
        encryption_password: '{{ .encryption_password }}'
        auth_key: '"{{ .s3_access_key }},{{ .s3_secret_key }}"'
  data:
  - secretKey: hetzner_url
    remoteRef:
      key: hetzner-velero
      property: url
  - secretKey: hetzner_user
    remoteRef:
      key: hetzner-velero
      property: username
  - secretKey: hetzner_pass
    remoteRef:
      key: hetzner-velero
      property: password
  - secretKey: encryption_password
    remoteRef:
      key: hetzner-velero
      property: RCLONE_ENCRYPTION_PASSWORD
  - secretKey: s3_access_key
    remoteRef:
      key: hetzner-velero
      property: RCLONE_S3_ACCESS_KEY
  - secretKey: s3_secret_key
    remoteRef:
      key: hetzner-velero
      property: RCLONE_S3_SECRET_KEY
