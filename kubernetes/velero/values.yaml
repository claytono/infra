---
configuration:
  backupStorageLocation:
  - name: default
    provider: aws
    bucket: data
    config:
      region: rclone
      s3Url: https://rclone-s3-velero.k.oneill.net
      s3ForcePathStyle: 'true'
      checksumAlgorithm: ''

  volumeSnapshotLocation:
  - name: default
    provider: aws
    config:
      region: us-west-000

  features: EnableCSI
  defaultVolumesToFsBackup: false
  defaultSnapshotMoveData: true

deployNodeAgent: true

nodeAgent:
  privileged: false

uploaderType: kopia

credentials:
  existingSecret: velero-credentials

metrics:
  enabled: true
  service:
    annotations:
      prometheus.io/scrape: 'true'
      prometheus.io/port: '8085'

initContainers:
- name: velero-plugin-for-aws
  # renovate: datasource=docker depName=velero/velero-plugin-for-aws
  image: velero/velero-plugin-for-aws:v1.14.2@sha256:0751144c1c8e52d52c48717fbd13ad5a3061e612ae4d7ad744a946cd5b139d1a
  volumeMounts:
  - mountPath: /target
    name: plugins
