---
apiVersion: batch/v1
kind: CronJob

metadata:
  name: vrroom-daily-reboot

spec:
  schedule: 0 5 * * *  # 5:00 AM daily in local time
  timeZone: America/New_York
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: vrroom-daily-reboot
            image: alpine:3.23@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
            command: [/bin/sh, -c, echo "set reboot" | nc vrroom-37.oneill.net 2222]
          restartPolicy: Never
