---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: weather-bg

resources:
- namespace.yaml
- deployment.yaml
- service.yaml
- ingress.yaml

configMapGenerator:
- name: weather-bg-nginx-config
  files:
  - nginx.conf

generatorOptions:
  disableNameSuffixHash: true

commonAnnotations:
  argoManaged: 'true'

labels:

- pairs:
    app.kubernetes.io/name: weather-bg
    app.kubernetes.io/instance: weather-bg
  includeSelectors: true
